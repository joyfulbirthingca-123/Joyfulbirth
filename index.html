function syncToBackend(booking,scriptUrl){
  var url=(scriptUrl||HARDCODED_SCRIPT_URL);
  if(!url||!url.startsWith("https://"))return;
  try{
    // Send only essential fields to keep URL short and avoid encoding issues
    var payload={
      id:booking.id||"",
      sn:booking.serviceName||"",
      snf:booking.serviceNameFr||"",
      pk:booking.packageLabel||"",
      cn:booking.clientName||"",
      cp:booking.clientPhone||"",
      ce:booking.clientEmail||"",
      dt:booking.date||"",
      tm:booking.time||"",
      dur:booking.duration||60,
      loc:booking.location||"office",
      dc:booking.deliveryChoice||"",
      tz:booking.transportZoneLabel||"",
      tf:booking.transportFee||0,
      pm:booking.pumpName||"",
      pr:booking.price||0,
      nt:booking.notes||"",
      lg:booking.lang||"en",
      ca:booking.createdAt||""
    };
    var encoded=encodeURIComponent(JSON.stringify(payload));
    fetch(url+"?data="+encoded,{method:"GET",mode:"no-cors",cache:"no-cache"})
      .catch(function(e){console.warn("Sync failed:",e);});
  }catch(e){console.warn("Sync error:",e);}
}

                  </div>
                  {da.enabled&&da.times.map((t,ti)=><div key={ti} style={{display:"flex",alignItems:"center",gap:6,flex:1,flexWrap:"wrap"}}>
                    <input type="time" value={t.start} style={Object.assign({},S.ip,{width:"auto",flex:1,minWidth:90,padding:"4px 8px",fontSize:13})} onChange={e=>{var nt=da.times.map((x,xi)=>xi===ti?Object.assign({},x,{start:e.target.value}):x);setSvcFrm(Object.assign({},svcFrm,{customAvail:Object.assign({},ea2,{[i]:Object.assign({},da,{times:nt})})}));}}/>
                    <span style={{fontSize:12,color:C.t2}}>-</span>
                    <input type="time" value={t.end} style={Object.assign({},S.ip,{width:"auto",flex:1,minWidth:90,padding:"4px 8px",fontSize:13})} onChange={e=>{var nt=da.times.map((x,xi)=>xi===ti?Object.assign({},x,{end:e.target.value}):x);setSvcFrm(Object.assign({},svcFrm,{customAvail:Object.assign({},ea2,{[i]:Object.assign({},da,{times:nt})})}));}}/>
                  </div>)}
                </div>
              </div>;})}
            </div>
            <div style={{display:"flex",gap:8,marginTop:"0.75rem"}}>
              <button style={S.bp} onClick={()=>{var ex=svcs.filter(s=>s.id===svcFrm.id)[0];saveSvcs(ex?svcs.map(s=>s.id===svcFrm.id?svcFrm:s):svcs.concat([svcFrm]));setSvcFrm(null);showToast("Saved!");}}><IcoSave size={13}/> Save</button>
              <button style={S.bt} onClick={()=>setSvcFrm(null)}><IcoX size={13}/> Cancel</button>
            </div>
          </div>;
        })()}
      </div>}

      {aTab==="settings"&&<div>
        <p style={S.h2}>Settings</p>

        {/* Google integration card - shown at top as it's important */}
        <div style={Object.assign({},S.cd,{border:"1.5px solid "+C.accent,background:C.aBg,marginBottom:"1rem"})}>
          <p style={Object.assign({},S.h3,{marginBottom:"0.5rem",color:C.aDk})}><IcoLink size={14} style={{marginRight:6}}/> Google Sheets &amp; Calendar</p>
          <p style={Object.assign({},S.sb,{color:C.aDk,marginBottom:"0.85rem",fontSize:12})}>
            Paste your Google Apps Script URL here to automatically add bookings to your Google Sheet and Google Calendar.
            See the <strong>code.gs</strong> file for setup instructions (takes ~5 minutes).
          </p>
          <label style={S.lb}>Backend URL (Google Apps Script Web App URL)</label>
          <input type="url" style={S.ip} placeholder="https://script.google.com/macros/s/YOUR_ID/exec"
            value={(editSt||sett).scriptUrl||""}
            onChange={e=>setEditSt(Object.assign({},editSt||sett,{scriptUrl:e.target.value}))}/>
          {(editSt||sett).scriptUrl&&<div style={{marginTop:8,fontSize:12,color:C.ok}}>OK URL set - new bookings will sync to Sheets &amp; Calendar automatically</div>}
        </div>

        <div style={S.cd}>
          <p style={Object.assign({},S.h3,{marginBottom:"0.85rem"})}>Business details</p>
          {[{k:"businessName",l:"Business name"},{k:"tagline",l:"Tagline"},{k:"consultantName",l:"Your name (for messages)"},{k:"consultantPhone",l:"WhatsApp number (e.g. +1234567890)"},{k:"officeAddress",l:"Office address"}].map(function(f){return<div key={f.k} style={{marginBottom:"0.75rem"}}>
            <label style={S.lb}>{f.l}</label>
            <input type="text" style={S.ip} value={(editSt||sett)[f.k]||""} onChange={e=>setEditSt(Object.assign({},editSt||sett,{[f.k]:e.target.value}))}/>
          </div>;})}
        </div>
        <div style={S.cd}>
          <p style={Object.assign({},S.h3,{marginBottom:"0.85rem"})}>Security</p>
          <label style={S.lb}>Admin password</label>
          <input type="password" style={Object.assign({},S.ip,{marginBottom:"0.75rem"})} value={(editSt||sett).adminPassword||""} onChange={e=>setEditSt(Object.assign({},editSt||sett,{adminPassword:e.target.value}))}/>
        </div>
        <div style={S.cd}>
          <p style={Object.assign({},S.h3,{marginBottom:"0.5rem"})}> Pump inventory</p>
          <p style={Object.assign({},S.sb,{marginBottom:"0.85rem"})}>Set names and total stock. Live availability is tracked automatically from bookings.</p>
          {((editSt||sett).pumpInventory||[]).map(function(pump,pi){return<div key={pump.id} style={{background:C.inp,borderRadius:10,padding:"0.85rem",marginBottom:"0.75rem"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={S.lb}>Name (EN)</label><input type="text" style={S.ip} value={pump.name} onChange={e=>{var c=editSt||sett;setEditSt(Object.assign({},c,{pumpInventory:c.pumpInventory.map((p,i)=>i===pi?Object.assign({},p,{name:e.target.value}):p)}));}}/></div>
              <div><label style={S.lb}>Name (FR)</label><input type="text" style={S.ip} value={pump.nameFr||""} onChange={e=>{var c=editSt||sett;setEditSt(Object.assign({},c,{pumpInventory:c.pumpInventory.map((p,i)=>i===pi?Object.assign({},p,{nameFr:e.target.value}):p)}));}}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={S.lb}>Description (EN)</label><input type="text" style={S.ip} value={pump.desc||""} onChange={e=>{var c=editSt||sett;setEditSt(Object.assign({},c,{pumpInventory:c.pumpInventory.map((p,i)=>i===pi?Object.assign({},p,{desc:e.target.value}):p)}));}}/></div>
              <div><label style={S.lb}>Description (FR)</label><input type="text" style={S.ip} value={pump.descFr||""} onChange={e=>{var c=editSt||sett;setEditSt(Object.assign({},c,{pumpInventory:c.pumpInventory.map((p,i)=>i===pi?Object.assign({},p,{descFr:e.target.value}):p)}));}}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8,alignItems:"end"}}>
              <div><label style={S.lb}>Total units</label><input type="number" min="0" style={S.ip} value={pump.total} onChange={e=>{var c=editSt||sett;setEditSt(Object.assign({},c,{pumpInventory:c.pumpInventory.map((p,i)=>i===pi?Object.assign({},p,{total:Number(e.target.value)}):p)}));}}/></div>
              <div><label style={S.lb}>Icon</label>
                <select style={S.ip} value={pump.icon||"battery"} onChange={e=>{var c=editSt||sett;setEditSt(Object.assign({},c,{pumpInventory:c.pumpInventory.map((p,i)=>i===pi?Object.assign({},p,{icon:e.target.value}):p)}));}}>
                  <option value="battery"> Battery</option><option value="plug"> Plug-in</option>
                </select>
              </div>
              <button style={S.bd} onClick={()=>{var c=editSt||sett;setEditSt(Object.assign({},c,{pumpInventory:c.pumpInventory.filter((_,i)=>i!==pi)}));}}><IcoX size={11}/></button>
            </div>
          </div>;})}
          <button style={S.bs} onClick={()=>{var c=editSt||sett;setEditSt(Object.assign({},c,{pumpInventory:(c.pumpInventory||[]).concat([{id:Date.now().toString(),name:"New Pump",nameFr:"Nouveau tire-lait",desc:"",descFr:"",total:1,icon:"battery"}])}));}}><IcoPlus size={11}/> Add pump model</button>
        </div>
        <div style={S.cd}>
          <p style={Object.assign({},S.h3,{marginBottom:"0.5rem"})}> Transport / delivery zones</p>
          <p style={Object.assign({},S.sb,{marginBottom:"0.85rem"})}>Fees for home visits (breastfeeding) and pump delivery.</p>
          {((editSt||sett).transportZones||[]).map(function(z,zi){return<div key={z.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:"0.6rem"}}>
            <input type="text" placeholder="Zone (e.g. 0-5 km)" style={Object.assign({},S.ip,{flex:2})} value={z.label} onChange={e=>{var c=editSt||sett;setEditSt(Object.assign({},c,{transportZones:c.transportZones.map((x,i)=>i===zi?Object.assign({},x,{label:e.target.value}):x)}));}}/>
            <input type="number" placeholder="Fee" style={Object.assign({},S.ip,{flex:1,minWidth:70})} value={z.fee} onChange={e=>{var c=editSt||sett;setEditSt(Object.assign({},c,{transportZones:c.transportZones.map((x,i)=>i===zi?Object.assign({},x,{fee:Number(e.target.value)}):x)}));}}/>
            <span style={{fontSize:11,color:C.t2,whiteSpace:"nowrap"}}>TND</span>
            <button style={S.bd} onClick={()=>{var c=editSt||sett;setEditSt(Object.assign({},c,{transportZones:c.transportZones.filter((_,i)=>i!==zi)}));}}><IcoX size={11}/></button>
          </div>;})}
          <button style={Object.assign({},S.bs,{marginTop:4})} onClick={()=>{var c=editSt||sett;setEditSt(Object.assign({},c,{transportZones:(c.transportZones||[]).concat([{id:Date.now().toString(),label:"",fee:0}])}));}}><IcoPlus size={11}/> Add zone</button>
        </div>
        <button style={S.bp} onClick={()=>{saveSett(editSt||sett);setEditSt(null);showToast("Settings saved!");}}><IcoSave size={13}/> Save settings</button>
      </div>}
    </div>;
  }
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
