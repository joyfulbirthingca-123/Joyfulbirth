            <div style={{marginTop: 24, paddingTop: 16, borderTop: "1px solid var(--grey-light)"}}>
              {!confirmDelete ? (
                <span
                  style={{fontSize: 13, color: "#C0392B", cursor: "pointer", textDecoration: "underline"}}
                  onClick={() => { setConfirmDelete(true); setDeleteErr(""); }}
                >
                  Delete this client permanently
                </span>
              ) : (
                <div style={{background: "#FDEDEC", borderRadius: 8, padding: "14px 16px"}}>
                  <p style={{fontSize: 13, color: "#922B21", marginBottom: 4, fontWeight: 600}}>
                    Permanently delete {client.name}?
                  </p>
                  <p style={{fontSize: 12, color: "#922B21", marginBottom: 12, lineHeight: 1.5}}>
                    This removes their profile and all their recorded payments, add-on charges, and appointment notes. This can't be undone, and any amounts they paid will no longer appear in your accounting totals.
                  </p>
                  <div style={{display: "flex", gap: 8}}>
                    <button className="btn-secondary" style={{flex: "none", padding: "8px 14px"}} onClick={() => setConfirmDelete(false)}>
                      Keep client
                    </button>
                    <button
                      style={{flex: "none", padding: "8px 14px", background: "#C0392B", color: "white", border: "none", borderRadius: 10, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif"}}
                      disabled={deleting}
                      onClick={runDelete}
                    >
                      {deleting ? "Deleting..." : "Yes, delete permanently"}
                    </button>
                  </div>
                  {deleteErr && <p style={{fontSize: 12, color: "#922B21", marginTop: 8}}>{deleteErr}</p>}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "flex-start"}}>
          <div>
            <h2>{client.name}</h2>
            <p className="page-sub" style={{marginBottom: "2px"}}>{client.packageName}</p>
            {client.phone && <p className="page-sub" style={{marginTop: 0, marginBottom: 2}}>{client.phone}</p>}
            <p className="page-sub" style={{marginTop: 0}}>
              {client.location}
              {client.assignedStaff && client.assignedStaff.length > 0 ? " · " + client.assignedStaff.join(", ") : ""}
            </p>
          </div>
          <div style={{display: "flex", flexDirection: "column", gap: 6}}>
            <button className="btn-small" style={{background: "var(--grey-light)", color: "var(--grey)"}} onClick={() => setEditing(true)}>Edit details</button>
            <button className="btn-small" style={{background: "var(--grey-light)", color: "var(--grey)"}} onClick={printProfile}>Print profile</button>
          </div>
        </div>

        {!inv && (client.babyName || client.babyBirthDate || client.babyBirthDetails) && (
          <div className="component-block">
            <div className="component-label">Baby</div>
            <p style={{fontSize: 13, color: "var(--grey)", lineHeight: 1.6}}>
              {client.babyName && <span>{client.babyName}<br/></span>}
              {client.babyBirthDate && <span>Born {client.babyBirthDate}{client.babyWeight ? " · " + client.babyWeight + " kg" : ""}<br/></span>}
              {client.babyBirthDetails && <span>{client.babyBirthDetails}</span>}
            </p>
          </div>
        )}

        {!inv && pkg && pkg.components.map(comp => (
          <ComponentTracker key={comp.id} client={client} component={comp} pin={pin} onUpdated={onUpdated} />
        ))}

        {!inv && <ClientBookings client={client} pin={pin} />}

        {!inv && <AppointmentsLog client={client} pin={pin} />}

        {!inv && <PaymentPlan client={client} pin={pin} onUpdated={onUpdated} />}

        {!inv && <PaymentLedger client={client} pin={pin} onUpdated={onUpdated} packages={packages} />}

        {!inv && (
          <div className="component-block">
            <div className="component-label">Invoice</div>
            <button className="btn-small" onClick={generateInvoice} disabled={generating}>
              {generating ? "Preparing..." : "Generate invoice for " + client.name}
            </button>
          </div>
        )}

        {inv && (
          <React.Fragment>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14}}>
              <span style={{fontSize: 13, color: "var(--magenta-dark)", cursor: "pointer", textDecoration: "underline"}} onClick={() => setInv(null)}>
                ‹ Back to profile
              </span>
            </div>
            <div className="invoice-controls">
              <div className="row">
                <label>Invoice No.</label>
                <input type="text" value={invoiceNumber} onChange={e => setInvoiceNumber(e.target.value)} placeholder="e.g. 12/2026" />
              </div>
              <div className="row">
                <label>Objet</label>
                <input type="text" value={objet} onChange={e => setObjet(e.target.value)} placeholder="Prestation de service mois de ..." />
              </div>
              <div className="row">
                <label>Language</label>
                <div className="assign-chips">
                  <span className={"assign-chip" + (invLang === "fr" ? " on" : "")} onClick={() => setInvLang("fr")}>Français (fiscal)</span>
                  <span className={"assign-chip" + (invLang === "en" ? " on" : "")} onClick={() => setInvLang("en")}>English (insurance)</span>
                </div>
              </div>
            </div>
            {invLang === "en" && (
              <p style={{fontSize: 12, color: "var(--grey)", marginBottom: 8}}>
                English version is a simplified services invoice (no TVA/timbre lines) for American insurance. Use Français for Tunisian fiscal records.
              </p>
            )}
            <InvoiceDocument inv={invForDoc} invoiceNumber={invoiceNumber} lang={invLang} />
            <div className="invoice-actions">
              <button className="btn-print" onClick={saveAndPrint} disabled={saving}>
                {saving ? "Saving..." : "Save to log & Download/Print"}
              </button>
              <button className="btn-print" onClick={printInvoice}>
                Download / Print
              </button>
            </div>
            {note && <p style={{fontSize: 12, color: saved ? "var(--grey)" : "var(--magenta-dark)", marginTop: 8}}>{note}</p>}
            <p style={{fontSize: 12, color: "var(--grey)", marginTop: 8}}>
              The invoice number is editable — set it to continue your real sequence.
            </p>
          </React.Fragment>
        )}

        {!inv && <button className="close-btn" onClick={onClose}>Done</button>}
      </div>
    </div>
  );
}

function ImportClientsView({ pin, onClose, onImported }) {
  const [candidates, setCandidates] = useState(null);
  const [packages, setPackages] = useState([]);
  const [selections, setSelections] = useState({}); // phone -> { packageId, skip }
  const [loading, setLoading] = useState(true);
  const [importing, setImporting] = useState(false);
  const [ficheErrors, setFicheErrors] = useState([]);
  const [debug, setDebug] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");

  useEffect(() => {
    apiCall({ action: "getImportCandidates", pin }).then(res => {
      if (res.success) {
        setCandidates(res.candidates);
        setPackages(res.packages);
        setFicheErrors(res.ficheErrors || []);
        setDebug(res.debug || null);
        const initial = {};
        res.candidates.forEach(c => {
          initial[c.phone] = { packageId: c.suggestedPackageId, skip: !c.suggestedPackageId };
        });
        setSelections(initial);
      } else {
        setErrorMsg(res.error || "Could not load candidates.");
      }
      setLoading(false);
    });
  }, [pin]);

  const updateSelection = (phone, field, value) => {
    setSelections(prev => ({ ...prev, [phone]: { ...prev[phone], [field]: value } }));
  };

  const runImport = () => {
    const approvedList = (candidates || [])
      .filter(c => !selections[c.phone].skip && selections[c.phone].packageId)
      .map(c => ({
        name: c.name,
        phone: c.rawPhone,
        email: c.email,
        packageId: selections[c.phone].packageId
      }));
    if (approvedList.length === 0) return;
    setImporting(true);
    apiCall({ action: "importApprovedClients", pin, approvedList: JSON.stringify(approvedList) }).then(res => {
      setImporting(false);
      if (res.success) onImported(res.created);
    });
  };

  const approvedCount = candidates ? candidates.filter(c => !selections[c.phone]?.skip && selections[c.phone]?.packageId).length : 0;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{maxWidth: 560}} onClick={e => e.stopPropagation()}>
        <h2>Import clients</h2>
        <p className="page-sub" style={{marginBottom: 16}}>
          Found from your booking history and intake fiches. Review the suggested package for each — nothing is saved until you confirm.
        </p>

        {ficheErrors.length > 0 && (
          <div style={{background: "#FEF3CD", borderRadius: 8, padding: "10px 12px", marginBottom: 14, fontSize: 12, color: "#92400E"}}>
            Couldn't read one or more fiche sheets: {ficheErrors.join("; ")}
          </div>
        )}

        {loading && <div className="loading">Scanning bookings and fiches...</div>}

        {!loading && errorMsg && (
          <div className="card empty-state" style={{color: "var(--magenta-dark)"}}>
            Couldn't scan your data: {errorMsg}
          </div>
        )}

        {!loading && !errorMsg && candidates && candidates.length === 0 && (
          <div className="card empty-state">
            No new clients found — everyone in your bookings and fiches already has a profile.
            {debug && (
              <div style={{fontSize: 11, color: "var(--grey)", marginTop: 8, lineHeight: 1.6}}>
                Scanned {debug.bookingsScanned} bookings · {debug.breastfeedingFicheRows} breastfeeding fiche rows · {debug.generalFicheRows} general fiche rows · {debug.existingClients} clients already on file.
              </div>
            )}
          </div>
        )}

        {!loading && candidates && candidates.length > 0 && (
          <React.Fragment>
            <div className="import-summary">
              <span style={{fontSize: 13, color: "var(--grey)"}}>{candidates.length} found</span>
              <span style={{fontSize: 13, fontWeight: 600, color: "var(--magenta-dark)"}}>{approvedCount} will be imported</span>
            </div>

            {candidates.map((c) => {
              const sel = selections[c.phone] || { packageId: null, skip: true };
              return (
                <div className={"import-card" + (sel.skip ? " skip" : "")} key={c.phone}>
                  <div className="import-row-top">
                    <div>
                      <div className="import-name">{c.name}</div>
                      <div className="import-phone">{c.rawPhone}</div>
                    </div>
                    <span className={"confidence-tag " + (c.confidence === "likely" ? "likely" : "needs-review")}>
                      {c.confidence === "likely" ? "Likely" : "Needs review"}
                    </span>
                  </div>
                  <div className="import-sources">{c.sources.join(" \u00b7 ")}</div>

                  {!sel.skip && (
                    <div className="import-pkg-select">
                      <select
                        value={sel.packageId || ""}
                        onChange={e => updateSelection(c.phone, "packageId", e.target.value)}
                      >
                        <option value="">Choose a package...</option>
                        {packages.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                      </select>
                    </div>
                  )}

                  <span className="import-skip-toggle" onClick={() => updateSelection(c.phone, "skip", !sel.skip)}>
                    {sel.skip ? "Include this client" : "Skip this client"}
                  </span>
                </div>
              );
            })}
          </React.Fragment>
        )}

        <div className="modal-actions">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-confirm" disabled={approvedCount === 0 || importing} onClick={runImport}>
            {importing ? "Importing..." : "Import " + approvedCount + " client" + (approvedCount !== 1 ? "s" : "")}
          </button>
        </div>
      </div>
    </div>
  );
}

function ClientsView({ pin, currentStaff }) {
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("name-az");
  const [fStatus, setFStatus] = useState("all");
  const [fLocation, setFLocation] = useState("all");
  const [fPayment, setFPayment] = useState("all");
  const [clients, setClients] = useState([]);
  const [packages, setPackages] = useState([]);
  const [staffList, setStaffList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedClient, setSelectedClient] = useState(null);
  const [showNewClient, setShowNewClient] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showMerge, setShowMerge] = useState(false);
  const [importMsg, setImportMsg] = useState("");

  const load = () => {
    setLoading(true);
    apiCall({ action: "getClients", pin }).then(res => {
      if (res.success) {
        setClients(res.clients);
        setPackages(res.packages);
        if (res.staffList) setStaffList(res.staffList);
      }
      setLoading(false);
    });
  };

  useEffect(() => { load(); }, [pin]);

  const statusOf = (c) => String(c.status || "active").toLowerCase();

  const filtered = clients
    .filter(c => c.name.toLowerCase().includes(search.toLowerCase()))
    .filter(c => {
      if (fStatus === "all") return true;
      const s = statusOf(c);
      if (fStatus === "active") return s === "active" || s === "" || s === "confirmed";
      if (fStatus === "completed") return s === "completed" || s === "past" || s === "done";
      return true;
    })
    .filter(c => fLocation === "all" || (c.location || "") === fLocation)
    .filter(c => {
      if (fPayment === "all") return true;
      if (fPayment === "paid") return c.balance <= 0;
      if (fPayment === "owing") return c.balance > 0;
      return true;
    });

  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === "name-az") return a.name.localeCompare(b.name);
    if (sortBy === "name-za") return b.name.localeCompare(a.name);
    if (sortBy === "newest") return String(b.createdAt || "").localeCompare(String(a.createdAt || ""));
    if (sortBy === "balance") return (b.balance || 0) - (a.balance || 0);
    return 0;
  });

  const printClientList = () => {
    const filterDesc = [];
    if (fStatus !== "all") filterDesc.push("Status: " + fStatus);
    if (fLocation !== "all") filterDesc.push("Location: " + fLocation);
    if (fPayment !== "all") filterDesc.push("Payment: " + fPayment);
    if (search) filterDesc.push('Search: "' + search + '"');
    let rows = sorted.map(c =>
      "<tr><td>" + escapeHtml(c.name) + "</td><td>" + escapeHtml(c.packageName || "") +
      "</td><td>" + escapeHtml(c.location || "") + "</td><td>" + escapeHtml((c.status || "active")) +
      "</td><td>" + (c.balance <= 0 ? "Paid" : escapeHtml(c.balance + " TND due")) +
      "</td><td>" + escapeHtml(c.phone || "") + "</td></tr>"
    ).join("");
    const body =
      "<h1>Client list</h1>" +
      '<div class="meta">' + sorted.length + " client" + (sorted.length !== 1 ? "s" : "") +
      (filterDesc.length ? " · " + escapeHtml(filterDesc.join(" · ")) : "") + "</div>" +
      "<table><thead><tr><th>Name</th><th>Package</th><th>Location</th><th>Status</th><th>Balance</th><th>Phone</th></tr></thead><tbody>" +
      rows + "</tbody></table>";
    printDocument("Client list", body);
  };

  const reopenSelected = () => {
    load();
    if (selectedClient) {
      apiCall({ action: "getClients", pin }).then(res => {
        if (res.success) {
          const updated = res.clients.find(c => c.id === selectedClient.id);
          if (updated) setSelectedClient(updated);
        }
      });
    }
  };

  return (
    <div>
      <h1 className="page-title">Clients</h1>
      <p className="page-sub">{clients.length} client{clients.length !== 1 ? "s" : ""} on file</p>

      <button className="add-client-btn" onClick={() => setShowNewClient(true)}>+ New client</button>
      <button className="add-client-btn" style={{background: "var(--grey-light)", color: "var(--grey)", marginLeft: 8}} onClick={() => setShowImport(true)}>Import from bookings/fiches</button>
      <button className="add-client-btn" style={{background: "var(--grey-light)", color: "var(--grey)", marginLeft: 8}} onClick={() => printClientList()}>Print list</button>
      {currentStaff && currentStaff.role === "owner" && (
        <button className="add-client-btn" style={{background: "var(--grey-light)", color: "var(--grey)", marginLeft: 8}} onClick={() => setShowMerge(true)}>Consolidate duplicates</button>
      )}

      {importMsg && (
        <div style={{background: "var(--ok-bg)", color: "var(--ok)", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13}}>
          {importMsg}
        </div>
      )}

      <input
        className="search-bar"
        placeholder="Search clients..."
        value={search}
        onChange={e => setSearch(e.target.value)}
      />

      <div style={{display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14}}>
        <select className="form-select" style={{flex: "1 1 140px", maxWidth: 200}} value={sortBy} onChange={e => setSortBy(e.target.value)}>
          <option value="name-az">Sort: Name A–Z</option>
          <option value="name-za">Sort: Name Z–A</option>
          <option value="newest">Sort: Newest first</option>
          <option value="balance">Sort: Balance owed</option>
        </select>
        <select className="form-select" style={{flex: "1 1 120px", maxWidth: 180}} value={fStatus} onChange={e => setFStatus(e.target.value)}>
          <option value="all">Status: All</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
        </select>
        <select className="form-select" style={{flex: "1 1 120px", maxWidth: 180}} value={fLocation} onChange={e => setFLocation(e.target.value)}>
          <option value="all">Location: All</option>
          <option value="Sousse">Sousse</option>
          <option value="Tunis">Tunis</option>
        </select>
        <select className="form-select" style={{flex: "1 1 120px", maxWidth: 180}} value={fPayment} onChange={e => setFPayment(e.target.value)}>
          <option value="all">Payment: All</option>
          <option value="paid">Paid in full</option>
          <option value="owing">Owing</option>
        </select>
      </div>

      {loading && <div className="loading">Loading clients...</div>}
      {!loading && (
        <p style={{fontSize: 12, color: "var(--grey)", marginBottom: 8}}>
          Showing {sorted.length} of {clients.length}
          {(fStatus !== "all" || fLocation !== "all" || fPayment !== "all" || search) && (
            <span style={{marginLeft: 8, color: "var(--magenta-dark)", cursor: "pointer", textDecoration: "underline"}}
              onClick={() => { setSearch(""); setFStatus("all"); setFLocation("all"); setFPayment("all"); }}>
              clear filters
            </span>
          )}
        </p>
      )}
      {!loading && sorted.length === 0 && <div className="card empty-state">No clients match those filters.</div>}

      {!loading && sorted.map((c, i) => (
        <div className="client-card" key={c.id || i} onClick={() => setSelectedClient(c)}>
          <div className="client-header">
            <div>
              <div className="client-name">{c.name}</div>
              <div className="client-services">{c.packageName}</div>
            </div>
            <div style={{display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4}}>
              {statusOf(c) === "completed" || statusOf(c) === "past"
                ? <span className="badge" style={{background: "var(--grey-light)", color: "var(--grey)"}}>Completed</span>
                : null}
              {c.location && <span className="badge">{c.location}</span>}
              <span className={"balance-tag" + (c.balance <= 0 ? " paid" : " owed")}>
                {c.balance <= 0 ? "Paid" : c.balance + " TND due"}
              </span>
            </div>
          </div>
        </div>
      ))}

      {selectedClient && (
        <ClientProfileModal
          client={selectedClient}
          packages={packages}
          staffList={staffList}
          currentStaff={currentStaff}
          pin={pin}
          onClose={() => setSelectedClient(null)}
          onUpdated={reopenSelected}
          onDeleted={() => { setSelectedClient(null); load(); }}
        />
      )}

      {showNewClient && (
        <NewClientModal
          pin={pin}
          packages={packages}
          staffList={staffList}
          currentStaff={currentStaff}
          onClose={() => setShowNewClient(false)}
          onCreated={() => { setShowNewClient(false); load(); }}
        />
      )}

      {showMerge && (
        <MergeClientsModal
          pin={pin}
          onClose={() => setShowMerge(false)}
          onMerged={() => load()}
        />
      )}

      {showImport && (
        <ImportClientsView
          pin={pin}
          onClose={() => setShowImport(false)}
          onImported={(count) => {
            setShowImport(false);
            setImportMsg(count + " client" + (count !== 1 ? "s" : "") + " imported successfully.");
            load();
            setTimeout(() => setImportMsg(""), 5000);
          }}
        />
      )}
    </div>
  );
}

  return (

        <p><strong>Facture No. {invoiceNumber || "—"}</strong></p>

function InvoiceView({ pin }) {
  const FR_MONTHS = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
  const currentMonthFr = FR_MONTHS[new Date().getMonth()];

  const [clientName, setClientName] = useState("");
  const [services, setServices] = useState([{ description: "", amount: "" }]);
  const [objet, setObjet] = useState("Prestation de service mois de " + currentMonthFr);
  const [invoiceNumber, setInvoiceNumber] = useState("");
  const [inv, setInv] = useState(null);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [note, setNote] = useState("");

  useEffect(() => {
    apiCall({ action: "getSuggestedInvoiceNumber", pin }).then(res => {
      if (res.success) setInvoiceNumber(res.suggested + "/" + res.year);
    });
  }, [pin]);

  const addRow = () => setServices(prev => [...prev, { description: "", amount: "" }]);
  const updateRow = (i, field, value) => setServices(prev => prev.map((r, idx) => idx === i ? { ...r, [field]: value } : r));
  const removeRow = (i) => setServices(prev => prev.filter((_, idx) => idx !== i));

  const preview = () => {
    const valid = services.filter(r => r.description && r.amount);
    if (!valid.length) { setNote("Add at least one service with a price."); return; }
    setLoading(true);
    setSaved(false);
    setNote("");
    apiCall({
      action: "generateManualInvoiceData",
      pin,
      clientLabel: clientName,
      objet,
      services: JSON.stringify(valid)
    }).then(res => {
      setLoading(false);
      if (res.success) setInv(res);
      else setNote(res.error || "Could not build the invoice.");
    });
  };

  const saveAndPrint = () => {
    if (!inv) return;
    if (!invoiceNumber.trim()) { setNote("Enter an invoice number first."); return; }
    setSaving(true);
    apiCall({
      action: "recordManualInvoice",
      pin,
      invoiceNumber: invoiceNumber.trim(),
      clientLabel: clientName,
      totalTtc: inv.netAPayer.toFixed(3),
      objet
    }).then(res => {
      setSaving(false);
      if (res.success) {
        setSaved(true);
        setNote(res.duplicate ? "Saved — heads up: this number was already in your invoice log." : "Saved to your invoice log.");
        printInvoiceDoc({ ...inv, objet }, invoiceNumber, "fr");
      } else {
        setNote(res.error || "Could not save.");
      }
    });
  };

  const printOnly = () => printInvoiceDoc({ ...inv, objet }, invoiceNumber, "fr");

  return (
    <div>
      <h1 className="page-title">Generate invoice</h1>
      <p className="page-sub">A personalized invoice for one client — type their name and the service(s), set the invoice number, and print. Nothing is pulled from bookings here.</p>

      <div className="invoice-controls">
        <div className="row">
          <label>Invoice No.</label>
          <input type="text" value={invoiceNumber} onChange={e => setInvoiceNumber(e.target.value)} placeholder="e.g. 12/2026" />
        </div>
        <div className="row">
          <label>Client name</label>
          <input type="text" value={clientName} onChange={e => setClientName(e.target.value)} placeholder="Nom du client" />
        </div>
        <div className="row">
          <label>Objet</label>
          <input type="text" value={objet} onChange={e => setObjet(e.target.value)} placeholder="Prestation de service mois de ..." />
        </div>

        </React.Fragment>
      )}
    </div>
  );
}

function WeeklySummaryView({ pin }) {
  const getMonday = (d) => {
    const date = new Date(d);
    const day = date.getDay();
    const diff = date.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(date.setDate(diff));
  };
  const toInputStr = (d) => d.toISOString().split("T")[0];
  const addDays = (str, n) => { const d = new Date(str); d.setDate(d.getDate() + n); return toInputStr(d); };

  const [weekStart, setWeekStart] = useState(toInputStr(getMonday(new Date())));
  const [summary, setSummary] = useState(null);
  const [loading, setLoading] = useState(true);
  const [inv, setInv] = useState(null);
  const [invoiceNumber, setInvoiceNumber] = useState("");
  const [objet, setObjet] = useState(defaultObjet(toInputStr(getMonday(new Date()))));
  const [generating, setGenerating] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [note, setNote] = useState("");
  const [selected, setSelected] = useState({}); // line id -> true
  const [endDate, setEndDate] = useState(addDays(toInputStr(getMonday(new Date())), 6));
  const [exporting, setExporting] = useState(false);
  const [exportNote, setExportNote] = useState("");

  useEffect(() => {
    setLoading(true);
    setInv(null);
    setSaved(false);
    setNote("");
    setObjet(defaultObjet(weekStart));
    apiCall({ action: "getWeeklyDiversSummary", pin, weekStart, endStr: endDate }).then(res => {
      if (res.success) {
        setSummary(res);
        // Default: pre-check only the items that actually have a charge
        const initial = {};
        res.lineItems.forEach(li => { if (li.hasCharge) initial[li.id] = true; });
        setSelected(initial);
      }
      setLoading(false);
    });
  }, [weekStart, endDate]);

  useEffect(() => {
    apiCall({ action: "getSuggestedInvoiceNumber", pin }).then(res => {
      if (res.success) setInvoiceNumber(res.suggested + "/" + res.year);
    });
  }, [pin]);

  const selectedList = summary ? summary.lineItems.filter(li => selected[li.id]) : [];
  const selectedTotal = selectedList.reduce((s, li) => s + (li.base || 0), 0);

  const toggle = (id) => setSelected(prev => ({ ...prev, [id]: !prev[id] }));

  const generateInvoice = () => {
    if (selectedList.length === 0) { setNote("Select at least one item with a charge to invoice."); return; }
    setGenerating(true);
    setNote("");
    const periodEnd = endDate;
    apiCall({
      action: "generateInvoiceData",
      pin,
      periodStart: weekStart,
      periodEnd,
      clientLabel: "Clients Divers",
      otherServices: "[]",
      selectedItems: JSON.stringify(selectedList.map(li => ({ base: li.base, service: li.service, packageLabel: li.packageLabel })))
    }).then(res => {
      setGenerating(false);
      if (!res || !res.success) {
        setNote((res && res.error) ? res.error : "Something went wrong generating the invoice. Please try again.");
        return;
      }
      if (!res.lineItems || res.lineItems.length === 0) {
        setNote("None of the selected items had a charge amount, so there's nothing to invoice. Check that the items you picked have a price in the sheet.");
        return;
      }
      setInv(res);
    }).catch(err => {
      setGenerating(false);
      setNote("Couldn't reach the server. Check your connection and try again.");
    });
  };

  const saveAndPrint = () => {
    if (!inv) return;
    if (!invoiceNumber.trim()) { setNote("Enter an invoice number first."); return; }
    setSaving(true);
    apiCall({
      action: "recordManualInvoice",
      pin,
      invoiceNumber: invoiceNumber.trim(),
      clientLabel: "Clients Divers",
      totalTtc: inv.netAPayer.toFixed(3),
      objet
    }).then(res => {
      setSaving(false);
      if (res.success) {
        setSaved(true);
        setNote(res.duplicate ? "Saved — note: this number was already in your log." : "Saved to your invoice log.");
        printInvoiceDoc({ ...inv, objet }, invoiceNumber, "fr");
      } else {
        setNote(res.error || "Could not save.");
      }
    });
  };

  const printOnly = () => printInvoiceDoc({ ...inv, objet }, invoiceNumber, "fr");
  const invForDoc = inv ? { ...inv, objet } : null;

  const exportToSheet = () => {
    if (!inv) return;
    setExporting(true);
    setExportNote("");
    // Build a readable services summary from the invoice's line items
    const servicesStr = (inv.lineItems || []).map(li => li.description + " (x" + li.qty + ")").join(", ");
    const FR_MONTHS = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
    const monthStr = FR_MONTHS[new Date(weekStart).getMonth()];
    apiCall({
      action: "exportInvoiceToSheet",
      pin,
      month: monthStr,
      services: servicesStr,
      amount: inv.netAPayer.toFixed(3),
      factureNo: invoiceNumber,
      dateRange: weekStart + " to " + endDate
    }).then(res => {
      setExporting(false);
      if (res && res.success) setExportNote("Added to your spreadsheet ✓");
      else setExportNote((res && res.error) ? res.error : "Could not export to the spreadsheet.");
    }).catch(() => {
      setExporting(false);
      setExportNote("Couldn't reach the spreadsheet. Check the dashboard's access to it.");
    });
  };

  return (
    <div>
      <h1 className="page-title">Clients Divers — invoice</h1>
      <p className="page-sub">Aggregate services rendered over a period you choose. Set the dates, tick what to invoice. For a personalized invoice, open that client's profile instead.</p>

      <div className="week-picker" style={{flexWrap: "wrap"}}>
        <span style={{fontSize: 13, color: "var(--grey)"}}>From</span>
        <input type="date" value={weekStart} onChange={e => setWeekStart(e.target.value)} />
        <span style={{fontSize: 13, color: "var(--grey)"}}>to</span>
        <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
        <button className="btn-small" onClick={() => { const m = toInputStr(getMonday(new Date())); setWeekStart(m); setEndDate(addDays(m, 6)); }}>This week</button>
      </div>

      {loading && <div className="loading">Loading summary...</div>}

      {!loading && summary && (
        <div className="card">
          <h2 className="display" style={{fontSize: "18px", color: "var(--magenta-dark)", marginBottom: "4px"}}>
            {summary.weekStart} to {summary.weekEnd}
          </h2>
          <p className="page-sub" style={{marginBottom: "14px"}}>
            {summary.count} service{summary.count !== 1 ? "s" : ""} this week · {summary.chargeableCount} with a charge. Tick the ones to invoice.
          </p>

          {summary.lineItems.length === 0 && (
            <p style={{fontSize: 13, color: "var(--grey)", padding: "12px 0"}}>No bookings in this week.</p>
          )}

          {summary.lineItems.map((li) => (
            <div className="divers-row" key={li.id} style={{alignItems: "center", opacity: li.hasCharge ? 1 : 0.55}}>
              <label style={{display: "flex", alignItems: "center", gap: 8, cursor: "pointer", flex: 1}}>
                <input type="checkbox" checked={!!selected[li.id]} onChange={() => toggle(li.id)} />
                <span>{li.date} — {li.clientName} — {li.service}{li.packageLabel ? " (" + li.packageLabel + ")" : ""}</span>
              </label>
              <span style={{whiteSpace: "nowrap"}}>
                {li.hasCharge ? li.base + " TND" : <span style={{fontSize: 11, color: "var(--grey)"}}>no charge</span>}
              </span>
            </div>
          ))}

          <div className="divers-total">
            <span>Selected total (taxable)</span>
            <span>{selectedTotal.toFixed(3)} TND</span>
          </div>
        </div>
      )}

      {!loading && summary && summary.lineItems.length > 0 && !inv && (
        <div>
          <button className="btn-print" onClick={generateInvoice} disabled={generating}>
            {generating ? "Preparing..." : "Generate invoice from selected items"}
          </button>
          {note && <p style={{fontSize: 13, color: "var(--magenta-dark)", marginTop: 10}}>{note}</p>}
        </div>
      )}

      {inv && (
        <React.Fragment>
          <div className="invoice-controls" style={{marginTop: 14}}>
            <div className="row">
              <label>Invoice No.</label>
              <input type="text" value={invoiceNumber} onChange={e => setInvoiceNumber(e.target.value)} placeholder="e.g. 12/2026" />
            </div>
            <div className="row">
              <label>Objet</label>
              <input type="text" value={objet} onChange={e => setObjet(e.target.value)} placeholder="Prestation de service mois de ..." />
            </div>
          </div>
          <InvoiceDocument inv={invForDoc} invoiceNumber={invoiceNumber} />
          <div className="invoice-actions">
            <button className="btn-print" onClick={saveAndPrint} disabled={saving}>
              {saving ? "Saving..." : "Save to log & Print"}
            </button>
            <button className="btn-print" onClick={printOnly}>Print without saving</button>
            <button className="btn-print" onClick={exportToSheet} disabled={exporting}>
              {exporting ? "Exporting..." : "Export to my spreadsheet"}
            </button>
          </div>
          {note && <p style={{fontSize: 12, color: saved ? "var(--grey)" : "var(--magenta-dark)", marginTop: 8}}>{note}</p>}
          {exportNote && <p style={{fontSize: 12, color: "var(--magenta-dark)", marginTop: 4}}>{exportNote}</p>}
          <p style={{fontSize: 12, color: "var(--grey)", marginTop: 8}}>
            The invoice number is editable — set it to continue your real sequence. "Save to log" records it so numbering stays tracked.
          </p>
        </React.Fragment>
      )}
    </div>
  );
}

function CalendarView({ pin, currentStaff }) {
  const now = new Date();
  const [month, setMonth] = useState(now.getMonth() + 1); // 1-12
  const [year, setYear] = useState(now.getFullYear());
  const [appointments, setAppointments] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedDay, setSelectedDay] = useState(null);
  const [selectedAppt, setSelectedAppt] = useState(null);
  const [clients, setClients] = useState([]);
  const [packages, setPackages] = useState([]);
  const [profileClient, setProfileClient] = useState(null);

  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dow = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  useEffect(() => {
    setLoading(true);
    setSelectedDay(null);
    setSelectedAppt(null);
    apiCall({ action: "getCalendarAppointments", pin, month, year }).then(res => {
      if (res.success) setAppointments(res.appointments);
      setLoading(false);
    });
  }, [month, year, pin]);

  useEffect(() => {
    apiCall({ action: "getClients", pin }).then(res => {
      if (res.success) {
        setClients(res.clients);
        if (res.packages) setPackages(res.packages);
      }
    });
  }, [pin]);

  // Find a client profile by name (calendar feed only carries the name)
  const openProfileFor = (name) => {
    const match = clients.find(c => c.name.toLowerCase() === String(name || "").toLowerCase());
    if (match) setProfileClient(match);
  };

  const shift = (dir) => {
    let m = month + dir;
    let y = year;
    if (m < 1) { m = 12; y -= 1; }
    if (m > 12) { m = 1; y += 1; }
    setMonth(m); setYear(y);
  };

  // Group appointments by day-of-month for quick lookup
  const byDay = {};
  appointments.forEach(a => {
    const day = new Date(a.date).getDate();
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(a);
  });

  // Build the grid: figure out the weekday of the 1st (Mon=0..Sun=6)
  const firstDow = (new Date(year, month - 1, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month, 0).getDate();
  const todayStr = new Date().toISOString().split("T")[0];

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const dayStr = (d) => year + "-" + String(month).padStart(2, "0") + "-" + String(d).padStart(2, "0");
  const detailList = selectedDay && byDay[selectedDay] ? byDay[selectedDay] : null;

  const printCalendar = () => {
    const sortedAppts = [...appointments].sort((a, b) => (a.date + (a.time || "")).localeCompare(b.date + (b.time || "")));
    if (sortedAppts.length === 0) { alert("No appointments this month to print."); return; }
    const rows = sortedAppts.map(a =>
      "<tr><td>" + escapeHtml(a.date) + "</td><td>" + escapeHtml(a.time || "—") +
      "</td><td>" + escapeHtml(a.clientName) + "</td><td>" + escapeHtml(a.service || "") +
      "</td><td>" + escapeHtml(a.location || "") + "</td><td>" + escapeHtml(a.staff || "") + "</td></tr>"
    ).join("");
    const body =
      "<h1>Appointments — " + monthNames[month - 1] + " " + year + "</h1>" +
      '<div class="meta">' + sortedAppts.length + " appointment" + (sortedAppts.length !== 1 ? "s" : "") + "</div>" +
      "<table><thead><tr><th>Date</th><th>Time</th><th>Client</th><th>Service</th><th>Location</th><th>Staff</th></tr></thead><tbody>" +
      rows + "</tbody></table>";
    printDocument("Calendar — " + monthNames[month - 1] + " " + year, body);
  };

  return (
    <div>
      <h1 className="page-title">Calendar</h1>
      <p className="page-sub">All appointments this month, from bookings and dashboard entries.</p>

      <div className="cal-header">
        <button className="cal-nav-btn" onClick={() => shift(-1)}>‹</button>
        <span className="cal-title">{monthNames[month - 1]} {year}</span>
        <button className="cal-nav-btn" onClick={() => shift(1)}>›</button>
        {loading && <span style={{fontSize: 12, color: "var(--grey)"}}>Loading...</span>}
        <button className="btn-small" style={{marginLeft: "auto"}} onClick={printCalendar}>Print month</button>
      </div>

      <div className="cal-grid">
        {dow.map(d => <div className="cal-dow" key={d}>{d}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div className="cal-cell empty" key={"e" + i}></div>;
          const evs = byDay[d] || [];
          const isToday = dayStr(d) === todayStr;
          return (
            <div className={"cal-cell" + (isToday ? " today" : "")} key={d}>
              <div className="cal-daynum">{d}</div>
              {evs.slice(0, 3).map((a, j) => (
                <div className="cal-event" key={j} title={a.clientName + " — " + a.service + (a.time ? " @ " + a.time : "")} onClick={() => setSelectedAppt(a)}>
                  {a.time ? a.time + " " : ""}{a.clientName}
                </div>
              ))}
              {evs.length > 3 && (
                <div className="cal-more" style={{cursor: "pointer"}} onClick={() => setSelectedDay(d)}>+{evs.length - 3} more</div>
              )}
            </div>
          );
        })}
      </div>

      {detailList && (
        <div className="cal-day-detail">
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8}}>
            <strong style={{color: "var(--magenta-dark)"}}>{monthNames[month - 1]} {selectedDay}, {year}</strong>
            <span style={{fontSize: 12, color: "var(--grey)", cursor: "pointer", textDecoration: "underline"}} onClick={() => { setSelectedDay(null); setSelectedAppt(null); }}>Close</span>
          </div>
          {detailList.map((a, i) => (
            <div className="cal-detail-row" key={i} style={{cursor: "pointer"}} onClick={() => setSelectedAppt(a)}>
              <span className="cal-detail-time">{a.time || "—"}</span>
              <div style={{flex: 1}}>
                <div style={{fontWeight: 600}}>{a.clientName}</div>
                <div style={{fontSize: 12, color: "var(--grey)"}}>{a.service}{a.location ? " · " + a.location : ""}{a.staff ? " · " + a.staff : ""}</div>
              </div>
              <span style={{fontSize: 16, color: "var(--grey)"}}>›</span>
            </div>
          ))}
        </div>
      )}

      {selectedAppt && (
        <div className="modal-overlay" onClick={() => setSelectedAppt(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()} style={{maxWidth: 460}}>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "flex-start"}}>
              <h2 style={{marginBottom: 4}}>{selectedAppt.clientName}</h2>
              <span style={{fontSize: 13, color: "var(--grey)", cursor: "pointer"}} onClick={() => setSelectedAppt(null)}>✕</span>
            </div>
            <p className="page-sub" style={{marginBottom: 16}}>Appointment details</p>

            <div className="component-block">
              <div className="ledger-row"><span style={{color: "var(--grey)"}}>Date</span><span style={{fontWeight: 600}}>{selectedAppt.date}</span></div>
              <div className="ledger-row"><span style={{color: "var(--grey)"}}>Time</span><span style={{fontWeight: 600}}>{selectedAppt.time || "—"}</span></div>
              <div className="ledger-row"><span style={{color: "var(--grey)"}}>Service</span><span style={{fontWeight: 600}}>{selectedAppt.service || "—"}</span></div>
              {selectedAppt.location && <div className="ledger-row"><span style={{color: "var(--grey)"}}>Location</span><span>{selectedAppt.location}</span></div>}
              {selectedAppt.staff && <div className="ledger-row"><span style={{color: "var(--grey)"}}>Staff</span><span>{selectedAppt.staff}</span></div>}
              {selectedAppt.status && <div className="ledger-row"><span style={{color: "var(--grey)"}}>Status</span><span>{selectedAppt.status}</span></div>}
            </div>

            {clients.find(c => c.name.toLowerCase() === String(selectedAppt.clientName || "").toLowerCase()) ? (
              <button className="btn-confirm" style={{marginTop: 12}} onClick={() => { openProfileFor(selectedAppt.clientName); setSelectedAppt(null); }}>
                View client profile
              </button>
            ) : (
              <p style={{fontSize: 12, color: "var(--grey)", marginTop: 12}}>
                No matching client profile (this may be a one-off booking or a name that differs from the profile).
              </p>
            )}
            <button className="btn-secondary" style={{marginTop: 8}} onClick={() => setSelectedAppt(null)}>Close</button>
          </div>
        </div>
      )}

      {profileClient && (
        <ClientProfileModal
          client={profileClient}
          packages={packages}
          staffList={[]}
          currentStaff={currentStaff}
          pin={pin}
          onClose={() => setProfileClient(null)}
          onUpdated={() => {}}
          onDeleted={() => setProfileClient(null)}
        />
      )}

      {!loading && appointments.length === 0 && (
        <div className="card empty-state" style={{marginTop: 16}}>No appointments scheduled this month.</div>
      )}
    </div>
  );
}

  const selectedPkg = packages.find(p => p.id === packageId);
  const canSave = name.trim() && phone.trim() && packageId;

  const toggleAssigned = (s) => setAssigned(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]);

  const checkFiche = () => {
    if (!phone.trim()) { setFicheResult({ found: false, error: "Enter a phone number first." }); setFicheChecked(true); return; }
    setFicheFinding(true);
    setFicheChecked(false);
    apiCall({ action: "lookupFicheByPhone", pin, phone }).then(res => {
      setFicheFinding(false);
      setFicheChecked(true);
      if (res.success && res.found) {
        setFicheResult(res);
        // Pre-fill from the fiche
        if (res.name && !name) setName(res.name);
        if (res.email && !email) setEmail(res.email);
        if (res.suggestedPackageId && !packageId) setPackageId(res.suggestedPackageId);
      } else {
        setFicheResult({ found: false });
      }
    });
  };

  const create = () => {
    if (!canSave) return;
    setCreating(true);
    apiCall({
      action: "createClient",
      pin,
      clientName: name,
      phone,
      email,
      packageId,
      customPrice: customPrice || "",
      location: location || (currentStaff ? currentStaff.location : ""),
      assignedStaff: assigned.join(", ")
    }).then(res => {
      setCreating(false);
      if (res.success) {
        setCreatedMsg(name + " has been added as a client.");
        // Reset the form for the next person
        setName(""); setPhone(""); setEmail(""); setPackageId(null);
        setCustomPrice(""); setAssigned([]); setFicheChecked(false); setFicheResult(null);
        setTimeout(() => setCreatedMsg(""), 6000);
      } else {
        setCreatedMsg(res.error || "Could not create the client.");
      }
    });
  };

  // Build a WhatsApp link with a pre-filled message containing the fiche link.
  const ficheLink = whichFiche === "breastfeeding" ? FICHE_LINK_BREASTFEEDING : FICHE_LINK_GENERAL;
  const waMessage =
    "Hello" + (name ? " " + name.split(" ")[0] : "") + "! This is Joyful Birth Services. " +
    "To get started, please fill out this short intake form so we can prepare for you: " + ficheLink +
    " — thank you! 💛";
  const waDigits = phone.replace(/[^\d]/g, "");
  const waLink = "https://wa.me/" + waDigits + "?text=" + encodeURIComponent(waMessage);
  const ficheLinkMissing = whichFiche === "breastfeeding" && FICHE_LINK_BREASTFEEDING.indexOf("PASTE_") === 0;

  return (
    <div>
      <h1 className="page-title">Onboard a new client</h1>
      <p className="page-sub">Add their details, pull an existing fiche if they filled one, and create their profile — or send them a fiche to fill.</p>

      {createdMsg && (
        <div style={{background: "var(--ok-bg)", color: "var(--ok)", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13}}>
          {createdMsg}
        </div>
      )}

      <div className="card">
        <div className="component-label">1 · Contact details</div>
        <div className="form-group">
          <label className="form-label">Client name</label>
          <input className="form-input" value={name} onChange={e => setName(e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">Phone (WhatsApp)</label>
          <div style={{display: "flex", gap: 8}}>
            <input className="form-input" value={phone} onChange={e => setPhone(e.target.value)} placeholder="+216 ..." />
            <button className="btn-small" onClick={checkFiche} disabled={ficheFinding} style={{whiteSpace: "nowrap"}}>
              {ficheFinding ? "Checking..." : "Check for fiche"}
            </button>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Email (optional)</label>
          <input className="form-input" value={email} onChange={e => setEmail(e.target.value)} />
        </div>

        {ficheChecked && ficheResult && ficheResult.found && (
          <div style={{background: "var(--ok-bg)", color: "var(--ok)", borderRadius: 8, padding: "10px 12px", fontSize: 12, marginBottom: 6}}>
            Found a {ficheResult.source} for this number — name, email, and suggested package filled in below. Double-check before saving.
          </div>
        )}
        {ficheChecked && ficheResult && !ficheResult.found && (
          <div style={{background: "#FEF3CD", color: "#92400E", borderRadius: 8, padding: "10px 12px", fontSize: 12, marginBottom: 6}}>
            {ficheResult.error ? ficheResult.error : "No fiche found for this number yet. You can still create the profile below, or send them a fiche to fill (further down)."}
          </div>
        )}
      </div>

      <div className="card">
        <div className="component-label">2 · Package &amp; assignment</div>
        <div className="form-group">
          <label className="form-label">Location</label>
          <select className="form-select" value={location} onChange={e => setLocation(e.target.value)}>
            {locations.map(l => <option key={l} value={l}>{l}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Package</label>
          {packages.map(p => (
            <div key={p.id} className={"pkg-option" + (packageId === p.id ? " selected" : "")} onClick={() => setPackageId(p.id)}>
              <span className="pname">{p.name}</span>
              <span className="pprice">{p.price} TND</span>
            </div>
          ))}
        </div>
        {selectedPkg && (
          <div className="form-group">
            <label className="form-label">Custom price (optional)</label>
            <input className="form-input" type="number" placeholder={selectedPkg.price + " TND (default)"} value={customPrice} onChange={e => setCustomPrice(e.target.value)} />
          </div>
        )}
        {staffList && staffList.length > 0 && (
          <div className="form-group">
            <label className="form-label">Assigned staff</label>
            <div className="assign-chips">
              {staffList.map(s => (
                <span key={s.name} className={"assign-chip" + (assigned.includes(s.name) ? " on" : "")} onClick={() => toggleAssigned(s.name)}>
                  {s.name}
                </span>
              ))}
            </div>
          </div>
        )}
        <button className="btn-confirm" style={{marginTop: 6}} disabled={!canSave || creating} onClick={create}>
          {creating ? "Creating..." : "Create client profile"}
        </button>
      </div>

      <div className="card">
        <div className="component-label">Send a fiche to fill (optional)</div>
        <p style={{fontSize: 12, color: "var(--grey)", marginBottom: 10}}>
          If they haven't filled a fiche, send them the right one over WhatsApp. Enter their phone above first.
        </p>
        <div className="assign-chips" style={{marginBottom: 10}}>
          <span className={"assign-chip" + (whichFiche === "general" ? " on" : "")} onClick={() => setWhichFiche("general")}>General fiche</span>
          <span className={"assign-chip" + (whichFiche === "breastfeeding" ? " on" : "")} onClick={() => setWhichFiche("breastfeeding")}>Breastfeeding fiche</span>
        </div>
        {ficheLinkMissing ? (
          <p style={{fontSize: 12, color: "#92400E"}}>
            The breastfeeding fiche link hasn't been set yet — add it near the top of the dashboard file (FICHE_LINK_BREASTFEEDING) to enable this.
          </p>
        ) : (
          <a
            href={waDigits ? waLink : undefined}
            target="_blank"
            rel="noopener noreferrer"
            className="btn-small"
            style={{display: "inline-block", textDecoration: "none", opacity: waDigits ? 1 : 0.5, pointerEvents: waDigits ? "auto" : "none"}}
          >
            Open WhatsApp message
          </a>
        )}
        {!waDigits && <p style={{fontSize: 11, color: "var(--grey)", marginTop: 6}}>Enter a phone number above to enable this.</p>}
      </div>
    </div>
  );
}

function GroupClassesView({ pin, currentStaff }) {
  const [clients, setClients] = useState([]);
  const [classes, setClasses] = useState(null);
  const [name, setName] = useState("");
  const [selectedIds, setSelectedIds] = useState([]);
  const [dates, setDates] = useState([""]);
  const [time, setTime] = useState("09:00");
  const [location, setLocation] = useState(currentStaff ? currentStaff.location : "Sousse");
  const [notes, setNotes] = useState("");
  const [clientSearch, setClientSearch] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [editId, setEditId] = useState(null);
  const [eName, setEName] = useState("");
  const [eIds, setEIds] = useState([]);
  const [eDates, setEDates] = useState([""]);
  const [eTime, setETime] = useState("09:00");
  const [eLocation, setELocation] = useState("Sousse");
  const [eNotes, setENotes] = useState("");
  const [eSearch, setESearch] = useState("");
  const isOwner = currentStaff && currentStaff.role === "owner";

  const startEdit = (gc) => {
    setEditId(gc.id);
    setEName(gc.name);
    setEIds(gc.clientIds || []);
    setEDates(gc.dates && gc.dates.length ? gc.dates : [""]);
    setETime(gc.time || "09:00");
    setELocation(gc.location || "Sousse");
    setENotes(gc.notes || "");
    setESearch("");
    setMsg("");
  };
  const cancelEdit = () => setEditId(null);
  const eToggleClient = (id) => setEIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const eSetDate = (i, v) => setEDates(prev => prev.map((d, idx) => idx === i ? v : d));
  const eAddDate = () => setEDates(prev => [...prev, ""]);
  const eRemoveDate = (i) => setEDates(prev => prev.filter((_, idx) => idx !== i));

  const saveEdit = () => {
    setBusy(true);
    apiCall({
      action: "updateGroupClass",
      pin,
      groupId: editId,
      name: eName,
      clientIds: JSON.stringify(eIds),
      dates: JSON.stringify(eDates.filter(d => d)),
      time: eTime,
      location: eLocation,
      notes: eNotes
    }).then(res => {
      setBusy(false);
      if (res.success) { setEditId(null); setMsg("Group class updated."); loadClasses(); }
      else setMsg(res.error || "Could not update.");
    });
  };

  const loadClients = () => {
    apiCall({ action: "getClients", pin }).then(res => {
      if (res.success) setClients(res.clients);
    });
  };
  const loadClasses = () => {
    apiCall({ action: "getGroupClasses", pin }).then(res => {
      if (res.success) setClasses(res.classes);
    });
  };
  useEffect(() => { loadClients(); loadClasses(); }, [pin]);

  const toggleClient = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const setDate = (i, v) => setDates(prev => prev.map((d, idx) => idx === i ? v : d));
  const addDate = () => setDates(prev => [...prev, ""]);
  const removeDate = (i) => setDates(prev => prev.filter((_, idx) => idx !== i));

  const validDates = dates.filter(d => d);
  const canCreate = name.trim() && selectedIds.length > 0 && validDates.length > 0;

  const create = () => {
    if (!canCreate) return;
    setBusy(true);
    setMsg("");
    apiCall({
      action: "createGroupClass",
      pin,
      name,
      clientIds: JSON.stringify(selectedIds),
      dates: JSON.stringify(validDates),
      time,
      location,
      notes
    }).then(res => {
      setBusy(false);
      if (res.success) {
        let m = "Group class created — " + res.sessions + " session" + (res.sessions !== 1 ? "s" : "") + " for " + res.clients + " client" + (res.clients !== 1 ? "s" : "") + ".";
        if (res.calendarOk === false) m += " (Calendar event couldn't be created — check calendar access.)";
        setMsg(m);
        setName(""); setSelectedIds([]); setDates([""]); setNotes("");
        loadClasses();
      } else {
        setMsg(res.error || "Could not create the group class.");
      }
    });
  };

  const removeClass = (id) => {
    apiCall({ action: "deleteGroupClass", pin, groupId: id }).then(res => {
      if (res.success) loadClasses();
      else setMsg(res.error || "Could not delete.");
    });
  };

  const shownClients = clients.filter(c => c.name.toLowerCase().includes(clientSearch.toLowerCase()));

  return (
    <div>
      <h1 className="page-title">Group classes</h1>
      <p className="page-sub">Schedule one session for several clients — one calendar event for the group, but each client keeps their own profile and pays their own fee.</p>

      {msg && (
        <div style={{background: "var(--ok-bg)", color: "var(--ok)", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13}}>
          {msg}
        </div>
      )}

      <div className="card">
        <div className="component-label">New group class</div>
        <div className="form-group">
          <label className="form-label">Class name</label>
          <input className="form-input" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Group CBE — March cohort" />
        </div>

        <div className="form-group">
          <label className="form-label">Clients in this class ({selectedIds.length} selected)</label>
          <input className="form-input" style={{marginBottom: 8}} placeholder="Search clients..." value={clientSearch} onChange={e => setClientSearch(e.target.value)} />
          <div style={{maxHeight: 180, overflowY: "auto", border: "1px solid var(--grey-light)", borderRadius: 8, padding: 8}}>
            {shownClients.length === 0 && <p style={{fontSize: 12, color: "var(--grey)", margin: 4}}>No clients match.</p>}
            <div className="assign-chips">
              {shownClients.map(c => (
                <span key={c.id} className={"assign-chip" + (selectedIds.includes(c.id) ? " on" : "")} onClick={() => toggleClient(c.id)}>
                  {c.name}
                </span>
              ))}
            </div>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Session date(s)</label>
          {dates.map((d, i) => (
            <div key={i} style={{display: "flex", gap: 8, marginBottom: 6}}>
              <input className="form-input" type="date" value={d} onChange={e => setDate(i, e.target.value)} />
              {dates.length > 1 && <button className="btn-remove-row" onClick={() => removeDate(i)}>×</button>}
            </div>
          ))}
          <button className="add-row-btn" onClick={addDate}>+ Add another date</button>
        </div>

        <div className="form-group" style={{display: "flex", gap: 10}}>
          <div style={{flex: 1}}>
            <label className="form-label">Time</label>
            <input className="form-input" type="time" value={time} onChange={e => setTime(e.target.value)} />
          </div>
          <div style={{flex: 1}}>
            <label className="form-label">Location</label>
            <select className="form-select" value={location} onChange={e => setLocation(e.target.value)}>
              <option value="Sousse">Sousse</option>
              <option value="Tunis">Tunis</option>
            </select>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Notes (optional)</label>
          <textarea className="form-input" rows={2} style={{resize: "vertical"}} value={notes} onChange={e => setNotes(e.target.value)} />
        </div>

        <button className="btn-confirm" disabled={!canCreate || busy} onClick={create}>
          {busy ? "Creating..." : "Create group class"}
        </button>
        {!canCreate && <p style={{fontSize: 11, color: "var(--grey)", marginTop: 6}}>Add a name, at least one client, and at least one date.</p>}
      </div>

      <h2 className="display" style={{fontSize: 18, color: "var(--magenta-dark)", margin: "24px 0 8px"}}>Existing group classes</h2>
      {!classes && <div className="loading">Loading...</div>}
      {classes && classes.length === 0 && <div className="card empty-state">No group classes yet.</div>}
      {classes && classes.map(gc => (
        <div className="card" key={gc.id}>
          {editId === gc.id ? (
            <div>
              <div className="component-label">Edit group class</div>
              <div className="form-group">
                <label className="form-label">Name</label>
                <input className="form-input" value={eName} onChange={e => setEName(e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">Clients ({eIds.length})</label>
                <input className="form-input" style={{marginBottom: 8}} placeholder="Search clients..." value={eSearch} onChange={e => setESearch(e.target.value)} />
                <div style={{maxHeight: 160, overflowY: "auto", border: "1px solid var(--grey-light)", borderRadius: 8, padding: 8}}>
                  <div className="assign-chips">
                    {clients.filter(c => c.name.toLowerCase().includes(eSearch.toLowerCase())).map(c => (
                      <span key={c.id} className={"assign-chip" + (eIds.includes(c.id) ? " on" : "")} onClick={() => eToggleClient(c.id)}>{c.name}</span>
                    ))}
                  </div>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Dates</label>
                {eDates.map((d, i) => (
                  <div key={i} style={{display: "flex", gap: 8, marginBottom: 6}}>
                    <input className="form-input" type="date" value={d} onChange={e => eSetDate(i, e.target.value)} />
                    {eDates.length > 1 && <button className="btn-remove-row" onClick={() => eRemoveDate(i)}>×</button>}
                  </div>
                ))}
                <button className="add-row-btn" onClick={eAddDate}>+ Add another date</button>
              </div>
              <div className="form-group" style={{display: "flex", gap: 10}}>
                <div style={{flex: 1}}>
                  <label className="form-label">Time</label>
                  <input className="form-input" type="time" value={eTime} onChange={e => setETime(e.target.value)} />
                </div>
                <div style={{flex: 1}}>
                  <label className="form-label">Location</label>
                  <select className="form-select" value={eLocation} onChange={e => setELocation(e.target.value)}>
                    <option value="Sousse">Sousse</option>
                    <option value="Tunis">Tunis</option>
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Notes</label>
                <textarea className="form-input" rows={2} style={{resize: "vertical"}} value={eNotes} onChange={e => setENotes(e.target.value)} />
              </div>
              <div className="modal-actions">
                <button className="btn-secondary" onClick={cancelEdit}>Cancel</button>
                <button className="btn-confirm" disabled={busy} onClick={saveEdit}>{busy ? "Saving..." : "Save changes"}</button>
              </div>
            </div>
          ) : (
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "flex-start"}}>
              <div>
                <div style={{fontWeight: 600, fontSize: 15}}>{gc.name}</div>
                <div style={{fontSize: 13, color: "var(--grey)", marginTop: 2}}>
                  {gc.dates.join(", ")}{gc.time ? " · " + gc.time : ""}{gc.location ? " · " + gc.location : ""}
                </div>
                <div style={{fontSize: 13, marginTop: 6}}>
                  <strong>{gc.clientNames.length} clients:</strong> {gc.clientNames.join(", ")}
                </div>
                {gc.notes && <div style={{fontSize: 12, color: "var(--grey)", marginTop: 4}}>{gc.notes}</div>}
              </div>
              <span style={{display: "flex", gap: 10, whiteSpace: "nowrap"}}>
                <span style={{fontSize: 11, color: "var(--magenta-dark)", cursor: "pointer", textDecoration: "underline"}} onClick={() => startEdit(gc)}>edit</span>
                {isOwner && (
                  <span style={{fontSize: 11, color: "#C0392B", cursor: "pointer"}} onClick={() => removeClass(gc.id)}>delete</span>
                )}
              </span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function MessagesView({ pin }) {
  const [data, setData] = useState(null);
  const [lang, setLang] = useState("en");
  const reviewMissing = GOOGLE_REVIEW_LINK.indexOf("PASTE_") === 0;

  useEffect(() => {
    apiCall({ action: "getMessageQueue", pin }).then(res => {
      if (res.success) setData(res);
    });
  }, [pin]);

  const Row = ({ a, message }) => {
    const hasPhone = String(a.phone || "").replace(/[^\d]/g, "").length > 0;
    return (
      <div className="ledger-row" style={{alignItems: "center"}}>
        <div>
          <div style={{fontSize: 13, fontWeight: 600}}>{a.clientName}</div>
          <div style={{fontSize: 12, color: "var(--grey)"}}>
            {a.date}{a.time ? " · " + a.time : ""}{a.service ? " · " + a.service : ""}

        </div>
        {hasPhone ? (
          <a href={waLink(a.phone, message)} target="_blank" rel="noopener noreferrer" className="btn-small" style={{textDecoration: "none", whiteSpace: "nowrap"}}>

          <span style={{fontSize: 11, color: "var(--grey)"}}>No phone</span>

  };

  return (

      <div className="assign-chips" style={{marginBottom: 14}}>
        <span className={"assign-chip" + (lang === "en" ? " on" : "")} onClick={() => setLang("en")}>English</span>
        <span className={"assign-chip" + (lang === "fr" ? " on" : "")} onClick={() => setLang("fr")}>Français</span>
      </div>

      {!data && <div className="loading">Loading...</div>}

      {data && (
        <React.Fragment>
          <div className="card">
            <div className="component-label">Reminders — appointments tomorrow ({data.reminders.length})</div>
            {data.reminders.length === 0 && <p style={{fontSize: 13, color: "var(--grey)"}}>No appointments tomorrow.</p>}
            {data.reminders.map((a, i) => <Row key={i} a={a} message={msgReminder(a, lang)} />)}
          </div>

          <div className="card">
            <div className="component-label">Follow-ups — recent visits ({data.followups.length})</div>
            {reviewMissing && (
              <p style={{fontSize: 11, color: "#92400E", marginBottom: 8}}>
                Tip: add your Google review link (GOOGLE_REVIEW_LINK near the top of the dashboard file) so the follow-up message includes it.
              </p>
            )}
            {data.followups.length === 0 && <p style={{fontSize: 13, color: "var(--grey)"}}>No recent visits to follow up on.</p>}
            {data.followups.map((a, i) => <Row key={i} a={a} message={msgFollowup(a, lang)} />)}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function ReportsView({ pin }) {
  const [periodType, setPeriodType] = useState("month");
  const [anchor, setAnchor] = useState(new Date().toISOString().split("T")[0]);
  const [customStart, setCustomStart] = useState(new Date().toISOString().split("T")[0]);
  const [customEnd, setCustomEnd] = useState(new Date().toISOString().split("T")[0]);
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = () => {
    setLoading(true);
    const params = { action: "getFlexibleReport", pin, periodType, anchor };
    if (periodType === "custom") { params.startStr = customStart; params.endStr = customEnd; }
    apiCall(params).then(res => {
      if (res.success) setReport(res);
      setLoading(false);
    });
  };

  useEffect(() => { load(); }, [periodType, anchor, customStart, customEnd]);

  const shiftAnchor = (dir) => {
    const d = new Date(anchor);
    if (periodType === "year") d.setFullYear(d.getFullYear() + dir);
    else d.setMonth(d.getMonth() + dir);
    setAnchor(d.toISOString().split("T")[0]);
  };

  const printReport = () => {
    if (!report) return;
    let body = "<h1>Business report — " + escapeHtml(report.label) + "</h1>";
    body += '<div class="meta">' + report.totalBookings + " bookings · " + escapeHtml(report.totalRevenue) + " TND total (taxable)</div>";

    body += "<h2>By service</h2><table><thead><tr><th>Service</th><th>Sessions</th><th>Unique clients</th><th>Revenue (TND)</th></tr></thead><tbody>";
    body += report.services.map(s => "<tr><td>" + escapeHtml(s.service) + "</td><td>" + s.sessions + "</td><td>" + s.uniqueClients + "</td><td>" + escapeHtml(s.revenue) + "</td></tr>").join("");

    body += '<div class="row"><span class="label">New this period</span><span>' + report.clients.newInPeriod + "</span></div>";
    body += '<div class="row"><span class="label">Active</span><span>' + report.clients.active + "</span></div>";
    body += '<div class="row"><span class="label">Completed</span><span>' + report.clients.completed + "</span></div>";
    body += "</div>";

    <div style={{background: "#FAF9F9", borderRadius: 10, padding: "14px 16px", flex: "1 1 130px", minWidth: 130}}>
      <div style={{fontSize: 22, fontWeight: 700, color: "var(--magenta-dark)"}}>{value}</div>

  return (

      <h1 className="page-title">Reports</h1>

              style={{padding: "8px 16px", border: "none", cursor: "pointer", fontSize: 13, fontFamily: "inherit",

          ))}
        </div>
        {periodType !== "custom" ? (
          <React.Fragment>
            <button className="btn-small" onClick={() => shiftAnchor(-1)}>← Prev</button>
            <span style={{fontSize: 14, fontWeight: 600, color: "var(--magenta-dark)"}}>{report ? report.label : "..."}</span>
            <button className="btn-small" onClick={() => shiftAnchor(1)}>Next →</button>

        ) : (
          <div style={{display: "flex", gap: 8, alignItems: "center"}}>
            <input className="form-input" type="date" value={customStart} onChange={e => setCustomStart(e.target.value)} />
            <span style={{fontSize: 12, color: "var(--grey)"}}>to</span>

        {report && <button className="btn-small" style={{marginLeft: "auto"}} onClick={printReport}>Print / PDF</button>}

      {loading && <div className="loading">Loading report...</div>}

                <span>{s.service}</span>
                <span style={{textAlign: "right"}}>
                  <strong>{s.sessions}</strong> session{s.sessions !== 1 ? "s" : ""} · {s.uniqueClients} client{s.uniqueClients !== 1 ? "s" : ""}

          <div className="card">
            <div className="component-label">Home visits vs in-office</div>

          {report.revenueByCity.length > 0 && (

}

function BackfillView({ pin, packages, staffList, currentStaff }) {
  const blank = () => ({ date: "", time: "", clientName: "", phone: "", service: "", basePrice: "", location: "", staff: "", notes: "" });
  const [rows, setRows] = useState([blank(), blank(), blank()]);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [makeProfiles, setMakeProfiles] = useState(true);

  const setField = (i, field, val) => setRows(prev => prev.map((r, idx) => idx === i ? { ...r, [field]: val } : r));
  const addRow = () => setRows(prev => [...prev, blank()]);
  const removeRow = (i) => setRows(prev => prev.filter((_, idx) => idx !== i));

  // Picking a package fills the service name and its standard price
  const pickPackage = (i, pkgId) => {
    const pkg = packages.find(p => p.id === pkgId);
    if (!pkg) { setField(i, "service", ""); return; }
    setRows(prev => prev.map((r, idx) => idx === i ? { ...r, service: pkg.name, basePrice: r.basePrice || String(pkg.price) } : r));
  };

  const filled = rows.filter(r => r.date && r.clientName);

  const submit = () => {
    if (filled.length === 0) { setMsg("Add at least one row with a date and client name."); return; }
    setBusy(true);
    setMsg("");
    apiCall({
      action: "bulkAddAppointments",
      pin,
      rows: JSON.stringify(filled),
      createProfiles: makeProfiles ? "yes" : "no"
    }).then(res => {
      setBusy(false);
      if (res && res.success) {
        let m = "Added " + res.added + " appointment" + (res.added !== 1 ? "s" : "") + ".";
        if (res.profilesCreated > 0) m += " Created " + res.profilesCreated + " new client profile" + (res.profilesCreated !== 1 ? "s" : "") + ".";
        if (res.errors && res.errors.length) m += " Skipped: " + res.errors.join(" ");
        setMsg(m);
        setRows([blank(), blank(), blank()]);
      } else {
        setMsg((res && res.error) ? res.error : "Could not add the appointments.");
      }
    }).catch(() => {
      setBusy(false);
      setMsg("Couldn't reach the server. Try again.");
    });
  };

  return (
    <div>
      <h1 className="page-title">Backfill past appointments</h1>
      <p className="page-sub">Enter appointments you've already had (e.g. January–February) in bulk. These write straight to your bookings — no calendar events are created, so your calendar stays clean.</p>

      {msg && (
        <div style={{background: "var(--ok-bg)", color: "var(--ok)", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13}}>
          {msg}
        </div>
      )}

      <div className="card">
        {rows.map((r, i) => (
          <div key={i} style={{borderBottom: "1px solid var(--grey-light)", paddingBottom: 12, marginBottom: 12}}>
            <div style={{display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end"}}>
              <div style={{flex: "1 1 130px"}}>
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={r.date} onChange={e => setField(i, "date", e.target.value)} />
              </div>
              <div style={{flex: "0 1 100px"}}>
                <label className="form-label">Time</label>
                <input className="form-input" type="time" value={r.time} onChange={e => setField(i, "time", e.target.value)} />
              </div>
              <div style={{flex: "1 1 150px"}}>
                <label className="form-label">Client name</label>
                <input className="form-input" value={r.clientName} onChange={e => setField(i, "clientName", e.target.value)} placeholder="Client" />
              </div>
              <div style={{flex: "1 1 130px"}}>
                <label className="form-label">Phone</label>
                <input className="form-input" value={r.phone} onChange={e => setField(i, "phone", e.target.value)} placeholder="optional" />
              </div>
              <div style={{flex: "1 1 160px"}}>
                <label className="form-label">Service</label>
                <select className="form-select" onChange={e => pickPackage(i, e.target.value)} value={packages.find(p => p.name === r.service) ? packages.find(p => p.name === r.service).id : ""}>
                  <option value="">— pick or type —</option>
                  {packages.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
                <input className="form-input" style={{marginTop: 4}} value={r.service} onChange={e => setField(i, "service", e.target.value)} placeholder="or type a service" />
              </div>
              <div style={{flex: "0 1 110px"}}>
                <label className="form-label">Price (TND)</label>
                <input className="form-input" type="number" value={r.basePrice} onChange={e => setField(i, "basePrice", e.target.value)} placeholder="0" />
              </div>
              <div style={{flex: "0 1 120px"}}>
                <label className="form-label">Location</label>
                <input className="form-input" value={r.location} onChange={e => setField(i, "location", e.target.value)} placeholder="Sousse" />
              </div>
              <div style={{flex: "0 1 120px"}}>
                <label className="form-label">Staff</label>
                <select className="form-select" value={r.staff} onChange={e => setField(i, "staff", e.target.value)}>
                  <option value="">{currentStaff ? currentStaff.name : "Me"}</option>
                  {staffList.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                </select>
              </div>
              {rows.length > 1 && <button className="btn-remove-row" onClick={() => removeRow(i)}>×</button>}
            </div>
            <input className="form-input" style={{marginTop: 6}} value={r.notes} onChange={e => setField(i, "notes", e.target.value)} placeholder="Notes (optional)" />
          </div>
        ))}

        <button className="add-row-btn" onClick={addRow}>+ Add another appointment</button>

        <div style={{marginTop: 16}}>
          <label style={{display: "flex", alignItems: "center", gap: 8, fontSize: 13, marginBottom: 10, cursor: "pointer"}}>
            <input type="checkbox" checked={makeProfiles} onChange={e => setMakeProfiles(e.target.checked)} />
            Also create client profiles for names not already in my client list
          </label>
          <button className="btn-confirm" disabled={busy || filled.length === 0} onClick={submit}>
            {busy ? "Adding..." : "Add " + filled.length + " appointment" + (filled.length !== 1 ? "s" : "")}
          </button>
          <p style={{fontSize: 11, color: "var(--grey)", marginTop: 6}}>
            Rows need at least a date and a client name. Price goes into Base Price (the taxable amount used by invoices and reports).
          </p>
        </div>
      </div>
    </div>
  );
}
