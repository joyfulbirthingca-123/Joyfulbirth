<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joyful Birth Services — Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root {
    --magenta: #DF4893;
    --magenta-dark: #9E2A66;
    --magenta-light: #F4A5CD;
    --pink-pale: #FCEAF3;
    --grey: #696768;
    --grey-light: #D9D7D8;
    --cream: #FAF8F9;
    --white: #FFFFFF;
    --ok: #3F9142;
    --ok-bg: #E8F5E9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--grey);
    min-height: 100vh;
  }
  .display { font-family: 'Cormorant Garamond', serif; }

  /* ── Lock screen ── */
  .lock-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .lock-card {
    background: var(--white);
    border-radius: 16px;
    padding: 48px 36px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(158, 42, 102, 0.08);
  }
  .lock-card h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--magenta-dark);
    margin-bottom: 4px;
  }
  .lock-card p.tagline {
    font-size: 13px;
    color: var(--grey);
    margin-bottom: 32px;
    letter-spacing: 0.02em;
  }
  .pin-input {
    width: 100%;
    font-size: 24px;
    letter-spacing: 8px;
    text-align: center;
    padding: 14px;
    border: 1.5px solid var(--grey-light);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 16px;
  }
  .pin-input:focus { outline: none; border-color: var(--magenta); }
  .btn-primary {
    width: 100%;
    background: var(--magenta);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-primary:hover { background: var(--magenta-dark); }
  .btn-primary:disabled { background: var(--grey-light); cursor: not-allowed; }
  .error-text { color: #C0392B; font-size: 13px; margin-top: 10px; }

  /* ── Shell ── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px;
    background: var(--white);
    border-right: 1px solid var(--grey-light);
    padding: 28px 16px;
    display: flex;
    flex-direction: column;
  }
  .sidebar .brand {
    font-size: 20px;
    font-weight: 600;
    color: var(--magenta-dark);
    margin-bottom: 4px;
    padding: 0 8px;
  }
  .sidebar .staff-name {
    font-size: 12px;
    color: var(--grey);
    padding: 0 8px;
    margin-bottom: 28px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--grey);
    margin-bottom: 4px;
    transition: background 0.12s;
  }
  .nav-item:hover { background: var(--pink-pale); }
  .nav-item.active { background: var(--magenta); color: white; }
  .nav-spacer { flex: 1; }
  .logout-link {
    font-size: 12px;
    color: var(--grey);
    padding: 8px 12px;
    cursor: pointer;
    text-decoration: underline;
  }

  .main { flex: 1; padding: 32px 40px; max-width: 1100px; }
  .page-title {
    font-size: 26px;
    font-weight: 600;
    font-family: 'Cormorant Garamond', serif;
    color: var(--magenta-dark);
    margin-bottom: 6px;
  }
  .page-sub { font-size: 13px; color: var(--grey); margin-bottom: 28px; }

  .card {
    background: var(--white);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 14px;
    border: 1px solid var(--grey-light);
  }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .appt-date-block {
    background: var(--pink-pale);
    border-radius: 10px;
    padding: 8px 14px;
    text-align: center;
    min-width: 64px;
  }
  .appt-date-block .day { font-size: 20px; font-weight: 700; color: var(--magenta-dark); line-height: 1; }
  .appt-date-block .mon { font-size: 11px; color: var(--magenta); text-transform: uppercase; letter-spacing: 0.05em; }
  .appt-info { flex: 1; }
  .appt-client { font-size: 15px; font-weight: 600; color: var(--grey); }
  .appt-service { font-size: 13px; color: var(--grey); opacity: 0.85; margin-top: 2px; }
  .appt-meta { font-size: 12px; color: var(--magenta); margin-top: 4px; }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--pink-pale);
    color: var(--magenta-dark);
    white-space: nowrap;
  }
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--grey);
    font-size: 14px;
  }

  /* Client list */
  .client-card {
    background: var(--white);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 12px;
    border: 1px solid var(--grey-light);
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .client-card:hover { border-color: var(--magenta-light); }
  .client-header { display: flex; justify-content: space-between; align-items: center; }
  .client-name { font-size: 16px; font-weight: 600; color: var(--grey); }
  .client-services { font-size: 12px; color: var(--grey); opacity: 0.8; margin-top: 3px; }

  .dots-row { display: flex; gap: 6px; margin-top: 12px; }
  .dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    border: 2px solid var(--grey-light);
    color: var(--grey-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .dot.done { background: var(--magenta); border-color: var(--magenta); color: white; }
  .dot:hover { border-color: var(--magenta); }

  .next-session-tag {
    font-size: 12px;
    color: var(--magenta-dark);
    font-weight: 500;
    margin-top: 10px;
    background: var(--pink-pale);
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .search-bar {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--grey-light);
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 20px;
    font-family: 'DM Sans', sans-serif;
  }
  .search-bar:focus { outline: none; border-color: var(--magenta); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(105, 103, 104, 0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-box {
    background: white;
    border-radius: 16px;
    padding: 32px;
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-box h2 { font-family: 'Cormorant Garamond', serif; color: var(--magenta-dark); font-size: 22px; margin-bottom: 4px; }
  .session-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--grey-light);
  }
  .session-row:last-child { border-bottom: none; }
  .session-checkbox {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: 2px solid var(--grey-light);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .session-checkbox.checked { background: var(--ok); border-color: var(--ok); color: white; }
  .session-label { font-size: 14px; color: var(--grey); }
  .close-btn {
    margin-top: 24px;
    width: 100%;
    background: var(--grey-light);
    color: var(--grey);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: white;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--grey-light);
  }
  .stat-box .num { font-size: 30px; font-weight: 700; color: var(--magenta-dark); font-family: 'Cormorant Garamond', serif; }
  .stat-box .label { font-size: 12px; color: var(--grey); margin-top: 2px; }
  .month-selector { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
  .month-selector select {
    padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--grey-light);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
  }
  .service-row {
    display: flex; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--grey-light);
    font-size: 14px;
  }
  .service-row:last-child { border-bottom: none; }
  .loading { text-align: center; padding: 60px; color: var(--grey); font-size: 14px; }

  /* New client / package selection */
  .add-client-btn {
    background: var(--magenta);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 18px;
  }
  .add-client-btn:hover { background: var(--magenta-dark); }
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--grey);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    display: block;
    margin-bottom: 5px;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--grey-light);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: white;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--magenta); }
  .pkg-option {
    border: 1.5px solid var(--grey-light);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pkg-option.selected { border-color: var(--magenta); background: var(--pink-pale); }
  .pkg-option .pname { font-size: 14px; font-weight: 600; color: var(--grey); }
  .pkg-option .pprice { font-size: 13px; color: var(--magenta-dark); font-weight: 600; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-secondary {
    flex: 1;
    background: var(--grey-light);
    color: var(--grey);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-confirm {
    flex: 1;
    background: var(--magenta);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }
  .btn-confirm:disabled { background: var(--grey-light); cursor: not-allowed; }

  /* Client profile card */
  .balance-tag { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .balance-tag.paid { background: var(--ok-bg); color: var(--ok); }
  .balance-tag.owed { background: #FEF3CD; color: #92400E; }
  .component-block { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--grey-light); }
  .component-label { font-size: 13px; font-weight: 600; color: var(--grey); margin-bottom: 8px; }
  .count-control { display: flex; align-items: center; gap: 10px; }
  .count-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--grey-light);
    background: white;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--grey);
  }
  .count-btn:hover { border-color: var(--magenta); }
  .count-display { font-size: 14px; font-weight: 600; color: var(--grey); min-width: 50px; text-align: center; }

  /* Payment ledger */
  .ledger-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--grey-light); font-size: 13px; }
  .ledger-row:last-child { border-bottom: none; }
  .payment-form-row { display: flex; gap: 8px; margin-top: 12px; }
  .payment-form-row input { flex: 1; }
  .btn-small {
    background: var(--magenta);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  /* Weekly Divers summary */
  .week-picker { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
  .week-picker input { padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--grey-light); font-family: 'DM Sans', sans-serif; font-size: 14px; }
  .divers-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--grey-light); font-size: 13px; }
  .divers-row:last-child { border-bottom: none; }
  .divers-total { display: flex; justify-content: space-between; padding: 14px 0 0; font-size: 15px; font-weight: 700; color: var(--magenta-dark); }

  /* Invoice document */
  .invoice-controls { margin-bottom: 24px; }
  .invoice-controls .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .invoice-controls label { font-size: 12px; color: var(--grey); white-space: nowrap; }
  .invoice-controls input[type="date"], .invoice-controls input[type="text"] {
    padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--grey-light);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
  }
  .other-service-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .other-service-row input { flex: 1; }
  .other-service-row input.amount { flex: 0 0 110px; }
  .btn-remove-row {
    background: transparent; border: none; color: var(--magenta-dark);
    cursor: pointer; font-size: 16px; padding: 0 8px;
  }
  .add-row-btn {
    background: transparent; border: 1.5px dashed var(--grey-light); color: var(--grey);
    border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; margin-top: 4px;
  }
  .invoice-doc {
    background: white;
    padding: 40px;
    border-radius: 4px;
    border: 1px solid var(--grey-light);
    color: #2A2829;
    font-family: 'DM Sans', sans-serif;
    max-width: 800px;
  }
  .invoice-doc .inv-header { display: flex; gap: 20px; margin-bottom: 24px; }
  .invoice-doc .inv-logo { width: 90px; height: 90px; background: #696768; border-radius: 4px; flex-shrink: 0; }
  .invoice-doc .inv-business-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
  .invoice-doc .inv-addr { font-size: 11px; color: #696768; line-height: 1.6; margin-top: 10px; }
  .invoice-doc .inv-meta { font-size: 13px; line-height: 1.7; margin: 20px 0; }
  .invoice-doc .inv-meta strong { font-weight: 700; }
  .invoice-doc table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 13px; }
  .invoice-doc th, .invoice-doc td { border: 1px solid #2A2829; padding: 10px; text-align: center; }
  .invoice-doc th { font-weight: 700; }
  .invoice-doc .inv-totals { display: flex; justify-content: flex-end; margin-top: 20px; }
  .invoice-doc .inv-totals table { width: 280px; }
  .invoice-doc .inv-totals td:first-child { text-align: left; font-weight: 700; }
  .invoice-doc .inv-words { margin-top: 30px; font-size: 13px; }
  .invoice-doc .inv-signature { margin-top: 60px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: #696768; }
  .invoice-actions { display: flex; gap: 10px; margin-top: 20px; max-width: 800px; }
  .btn-print {
    background: var(--magenta); color: white; border: none; border-radius: 10px;
    padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-print:disabled { background: var(--grey-light); cursor: not-allowed; }
  @media print {
    .sidebar, .invoice-controls, .invoice-actions, .page-title, .page-sub { display: none !important; }
    .main { padding: 0 !important; }
    .invoice-doc { border: none; max-width: 100%; }
  }

  @media (max-width: 720px) {
    .shell { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 14px; }
    .sidebar .brand, .sidebar .staff-name, .nav-spacer, .logout-link { display: none; }
    .main { padding: 20px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ───────────────────────────────────────────────────────────
// CONFIG — paste your Apps Script Web App URL below
// ───────────────────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbyfuYJIdtg0nbio2tZdbXKfnbXBHHlit47Joc9yaidfAjG0BkJMbSdirQRK4qPdrq4Q/exec";

function apiCall(params) {
  const url = API_URL + "?" + new URLSearchParams(params).toString();
  return fetch(url).then(r => r.json());
}

function LockScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = () => {
    if (!pin) return;
    setLoading(true);
    setError("");
    apiCall({ action: "login", pin }).then(res => {
      setLoading(false);
      if (res.success) {
        localStorage.setItem("jbs_pin", pin);
        onLogin(res.staff, pin);
      } else {
        setError(res.error || "PIN not recognized");
      }
    }).catch(() => {
      setLoading(false);
      setError("Connection error — check your internet and try again");
    });
  };

  return (
    <div className="lock-screen">
      <div className="lock-card">
        <h1 className="display">Joyful Birth</h1>
        <p className="tagline">Staff Dashboard</p>
        <input
          className="pin-input"
          type="password"
          inputMode="numeric"
          maxLength={6}
          placeholder="••••"
          value={pin}
          onChange={e => setPin(e.target.value.replace(/\D/g, ""))}
          onKeyDown={e => e.key === "Enter" && submit()}
          autoFocus
        />
        <button className="btn-primary" onClick={submit} disabled={loading}>
          {loading ? "Checking..." : "Enter"}
        </button>
        {error && <p className="error-text">{error}</p>}
      </div>
    </div>
  );
}

function formatDateBlock(dateStr) {
  if (!dateStr) return { day: "—", mon: "" };
  const d = new Date(dateStr);
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  return { day: d.getDate(), mon: months[d.getMonth()] };
}

function TodayView({ data }) {
  if (!data.upcoming || data.upcoming.length === 0) {
    return (
      <div>
        <h1 className="page-title">Upcoming appointments</h1>
        <p className="page-sub">Everything coming up across your client list</p>
        <div className="card empty-state">No upcoming appointments scheduled.</div>
      </div>
    );
  }
  return (
    <div>
      <h1 className="page-title">Upcoming appointments</h1>
      <p className="page-sub">{data.upcoming.length} appointment{data.upcoming.length !== 1 ? "s" : ""} coming up</p>
      {data.upcoming.map((a, i) => {
        const db = formatDateBlock(a.date);
        return (
          <div className="card" key={i}>
            <div className="card-row">
              <div className="appt-date-block">
                <div className="day">{db.day}</div>
                <div className="mon">{db.mon}</div>
              </div>
              <div className="appt-info">
                <div className="appt-client">{a.clientName}</div>
                <div className="appt-service">{a.service}</div>
                <div className="appt-meta">{a.time}{a.location ? " · " + a.location : ""}</div>
              </div>
              {a.staff && <span className="badge">{a.staff}</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function NewClientModal({ pin, packages, onClose, onCreated }) {
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [email, setEmail] = useState("");
  const [packageId, setPackageId] = useState(null);
  const [customPrice, setCustomPrice] = useState("");
  const [saving, setSaving] = useState(false);

  const selectedPkg = packages.find(p => p.id === packageId);
  const canSave = name.trim() && phone.trim() && packageId;

  const save = () => {
    if (!canSave) return;
    setSaving(true);
    apiCall({
      action: "createClient",
      pin,
      clientName: name,
      phone,
      email,
      packageId,
      customPrice: customPrice || ""

function ComponentTracker({ client, component, pin, onUpdated }) {
  const prog = client.progress[component.id];

  if (component.type === "sessions") {
    const sessions = component.sessions;
    const stateArr = Array.isArray(prog) ? prog : [];
    const isDone = (sid) => !!(stateArr.find(s => s.id === sid) || {}).completed;
    const nextSession = sessions.find(s => !isDone(s.id));

    const toggle = (sessionId, current) => {
      apiCall({
        action: "updateClientComponent",
        pin,
        clientId: client.id,
        componentId: component.id,
        sessionId,
        completed: !current
      }).then(() => onUpdated());
    };

    return (
      <div className="component-block">
        <div className="component-label">{component.label}</div>
        <div className="dots-row">
          {sessions.map(s => (
            <div
              key={s.id}
              className={"dot" + (isDone(s.id) ? " done" : "")}
              onClick={() => toggle(s.id, isDone(s.id))}
              title={s.name}
            >
              {s.id}
            </div>
          ))}
        </div>
        {nextSession ? (
          <div className="next-session-tag">Next up: {nextSession.name}</div>
        ) : (
          <div className="next-session-tag">All sessions complete</div>
        )}
      </div>
    );
  }

  // count-type component
  const done = (prog && typeof prog.done === "number") ? prog.done : 0;
  const target = component.target || 1;

  const setDone = (newDone) => {
    const clamped = Math.max(0, Math.min(newDone, target));
    apiCall({
      action: "updateClientComponent",
      pin,
      clientId: client.id,
      componentId: component.id,
      done: clamped
    }).then(() => onUpdated());
  };

  return (
    <div className="component-block">
      <div className="component-label">{component.label}{component.optional ? " (optional)" : ""}</div>
      <div className="count-control">
        <button className="count-btn" onClick={() => setDone(done - 1)}>−</button>
        <span className="count-display">{done} / {target}</span>
        <button className="count-btn" onClick={() => setDone(done + 1)}>+</button>
      </div>
    </div>
  );
}

function PaymentLedger({ client, pin, onUpdated }) {
  const [ledger, setLedger] = useState(null);
  const [amount, setAmount] = useState("");

  const load = () => {
    apiCall({ action: "getClientLedger", pin, clientId: client.id }).then(res => {
      if (res.success) setLedger(res);
    });
  };

  useEffect(() => { load(); }, [client.id]);

  const addPayment = () => {
    if (!amount) return;
    apiCall({
      action: "addPayment",
      pin,
      clientId: client.id,
      clientName: client.name,
      amount,
      method
    }).then(() => {
      setAmount("");
      setMethod("");
      load();
      onUpdated();
    });
  };

  if (!ledger) return <div className="component-block"><div className="loading">Loading payments...</div></div>;

  return (
    <div className="component-block">
      <div className="component-label">Payments</div>
      <div className="ledger-row" style={{fontWeight: 600}}>
        <span>Owed: {ledger.totalOwed} TND</span>

          {ledger.balance <= 0 ? "Paid in full" : ledger.balance + " TND remaining"}

      {ledger.payments.map(p => (
        <div className="ledger-row" key={p.id}>

        </div>

        <input className="form-input" placeholder="Method (cash, transfer...)" value={method} onChange={e => setMethod(e.target.value)} />

function InvoiceView({ pin }) {
  const getMonday = (d) => {
    const date = new Date(d);
    const day = date.getDay();
    const diff = date.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(date.setDate(diff));
  };
  const toInputStr = (d) => d.toISOString().split("T")[0];
  const addDays = (str, n) => {
    const d = new Date(str);
    d.setDate(d.getDate() + n);
    return toInputStr(d);
  };

  const [periodStart, setPeriodStart] = useState(toInputStr(getMonday(new Date())));
  const [periodEnd, setPeriodEnd] = useState(addDays(toInputStr(getMonday(new Date())), 6));
  const [clientLabel, setClientLabel] = useState("Clients Divers");
  const [otherServices, setOtherServices] = useState([]);
  const [inv, setInv] = useState(null);
  const [invoiceNumber, setInvoiceNumber] = useState(null);
  const [loading, setLoading] = useState(false);
  const [numbering, setNumbering] = useState(false);

  const addOtherRow = () => setOtherServices(prev => [...prev, { description: "", amount: "" }]);
  const updateOtherRow = (i, field, value) => {
    setOtherServices(prev => prev.map((r, idx) => idx === i ? { ...r, [field]: value } : r));
  };
  const removeOtherRow = (i) => setOtherServices(prev => prev.filter((_, idx) => idx !== i));

  const preview = () => {
    setLoading(true);
    setInvoiceNumber(null);
    const validOther = otherServices.filter(r => r.description && r.amount);
    apiCall({
      action: "generateInvoiceData",
      pin,
      periodStart,
      periodEnd,
      clientLabel,
      otherServices: JSON.stringify(validOther)
    }).then(res => {
      if (res.success) setInv(res);
      setLoading(false);
    });
  };

  const finalizeNumber = () => {
    if (!inv) return;
    setNumbering(true);
    apiCall({
      action: "generateInvoiceNumber",
      pin,
      periodStart,
      periodEnd,
      clientLabel,
      totalTtc: (inv.totalHt + inv.totalTva + inv.timbreFiscale).toFixed(3)
    }).then(res => {
      setNumbering(false);
      if (res.success) setInvoiceNumber(res.invoiceNumber);
    });
  };

  const printInvoice = () => window.print();

  return (
    <div>
      <h1 className="page-title">Generate invoice</h1>
      <p className="page-sub">Preview first, then assign a permanent invoice number only when you're ready to finalize — numbers never reuse or reset.</p>

      <div className="invoice-controls">
        <div className="row">
          <label>Period</label>
          <input type="date" value={periodStart} onChange={e => setPeriodStart(e.target.value)} />
          <span style={{fontSize: 13, color: "var(--grey)"}}>to</span>
          <input type="date" value={periodEnd} onChange={e => setPeriodEnd(e.target.value)} />
        </div>
        <div className="row">
          <label>Client label</label>
          <input type="text" value={clientLabel} onChange={e => setClientLabel(e.target.value)} placeholder="Clients Divers" />
        </div>

        <div className="row" style={{flexDirection: "column", alignItems: "stretch"}}>
          <label style={{marginBottom: 6}}>Autres Services (optional — for one-off items not from bookings)</label>
          {otherServices.map((row, i) => (
            <div className="other-service-row" key={i}>
              <input
                type="text"
                placeholder="Description"
                value={row.description}
                onChange={e => updateOtherRow(i, "description", e.target.value)}
              />
              <input
                type="text"
                className="amount"
                placeholder="Montant TND"
                value={row.amount}
                onChange={e => updateOtherRow(i, "amount", e.target.value)}
              />
              <button className="btn-remove-row" onClick={() => removeOtherRow(i)}>×</button>
            </div>
          ))}
          <button className="add-row-btn" onClick={addOtherRow}>+ Add other service</button>
        </div>

        <button className="btn-print" style={{marginTop: 14}} onClick={preview}>
          {loading ? "Loading..." : "Preview invoice"}
        </button>
      </div>

      {inv && (
        <React.Fragment>
          <InvoiceDocument inv={inv} invoiceNumber={invoiceNumber} />
          <div className="invoice-actions">
            {!invoiceNumber && (
              <button className="btn-print" onClick={finalizeNumber} disabled={numbering}>
                {numbering ? "Assigning..." : "Assign invoice number"}
              </button>
            )}
            <button className="btn-print" disabled={!invoiceNumber} onClick={printInvoice}>
              Print / Save as PDF
            </button>
          </div>
          {!invoiceNumber && (
            <p style={{fontSize: 12, color: "var(--grey)", marginTop: 8}}>
              This is a preview. Assign a number before printing so the invoice is properly recorded.
            </p>
          )}
        </React.Fragment>
      )}
    </div>
  );
}

function App() {
  const [staff, setStaff] = useState(null);
  const [pin, setPin] = useState(null);

  useEffect(() => {
    const savedPin = localStorage.getItem("jbs_pin");
    if (savedPin) {
      apiCall({ action: "login", pin: savedPin }).then(res => {
        if (res.success) {
          setStaff(res.staff);
          setPin(savedPin);
        } else {
          localStorage.removeItem("jbs_pin");
        }
      });
    }
  }, []);

  const handleLogout = () => {
    localStorage.removeItem("jbs_pin");
    setStaff(null);
    setPin(null);
  };

  if (!staff) {
    return <LockScreen onLogin={(s, p) => { setStaff(s); setPin(p); }} />;
  }

  return <Dashboard staff={staff} pin={pin} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
