<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joyful Birth Services — Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root {
    --magenta: #DF4893;
    --magenta-dark: #9E2A66;
    --magenta-light: #F4A5CD;
    --pink-pale: #FCEAF3;
    --grey: #696768;
    --grey-light: #D9D7D8;
    --cream: #FAF8F9;
    --white: #FFFFFF;
    --ok: #3F9142;
    --ok-bg: #E8F5E9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--grey);
    min-height: 100vh;
  }
  .display { font-family: 'Cormorant Garamond', serif; }

  /* ── Lock screen ── */
  .lock-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .lock-card {
    background: var(--white);
    border-radius: 16px;
    padding: 48px 36px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(158, 42, 102, 0.08);
  }
  .lock-card h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--magenta-dark);
    margin-bottom: 4px;
  }
  .lock-card p.tagline {
    font-size: 13px;
    color: var(--grey);
    margin-bottom: 32px;
    letter-spacing: 0.02em;
  }
  .pin-input {
    width: 100%;
    font-size: 24px;
    letter-spacing: 8px;
    text-align: center;
    padding: 14px;
    border: 1.5px solid var(--grey-light);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 16px;
  }
  .pin-input:focus { outline: none; border-color: var(--magenta); }
  .btn-primary {
    width: 100%;
    background: var(--magenta);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-primary:hover { background: var(--magenta-dark); }
  .btn-primary:disabled { background: var(--grey-light); cursor: not-allowed; }
  .error-text { color: #C0392B; font-size: 13px; margin-top: 10px; }

  /* ── Shell ── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px;
    background: var(--white);
    border-right: 1px solid var(--grey-light);
    padding: 28px 16px;
    display: flex;
    flex-direction: column;
  }
  .sidebar .brand {
    font-size: 20px;
    font-weight: 600;
    color: var(--magenta-dark);
    margin-bottom: 4px;
    padding: 0 8px;
  }
  .sidebar .staff-name {
    font-size: 12px;
    color: var(--grey);
    padding: 0 8px;
    margin-bottom: 28px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--grey);
    margin-bottom: 4px;
    transition: background 0.12s;
  }
  .nav-item:hover { background: var(--pink-pale); }
  .nav-item.active { background: var(--magenta); color: white; }
  .nav-spacer { flex: 1; }
  .logout-link {
    font-size: 12px;
    color: var(--grey);
    padding: 8px 12px;
    cursor: pointer;
    text-decoration: underline;
  }

  .main { flex: 1; padding: 32px 40px; max-width: 1100px; }
  .page-title {
    font-size: 26px;
    font-weight: 600;
    font-family: 'Cormorant Garamond', serif;
    color: var(--magenta-dark);
    margin-bottom: 6px;
  }
  .page-sub { font-size: 13px; color: var(--grey); margin-bottom: 28px; }

  .card {
    background: var(--white);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 14px;
    border: 1px solid var(--grey-light);
  }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .appt-date-block {
    background: var(--pink-pale);
    border-radius: 10px;
    padding: 8px 14px;
    text-align: center;
    min-width: 64px;
  }
  .appt-date-block .day { font-size: 20px; font-weight: 700; color: var(--magenta-dark); line-height: 1; }
  .appt-date-block .mon { font-size: 11px; color: var(--magenta); text-transform: uppercase; letter-spacing: 0.05em; }
  .appt-info { flex: 1; }
  .appt-client { font-size: 15px; font-weight: 600; color: var(--grey); }
  .appt-service { font-size: 13px; color: var(--grey); opacity: 0.85; margin-top: 2px; }
  .appt-meta { font-size: 12px; color: var(--magenta); margin-top: 4px; }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--pink-pale);
    color: var(--magenta-dark);
    white-space: nowrap;
  }
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--grey);
    font-size: 14px;
  }

  /* Client list */
  .client-card {
    background: var(--white);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 12px;
    border: 1px solid var(--grey-light);
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .client-card:hover { border-color: var(--magenta-light); }
  .client-header { display: flex; justify-content: space-between; align-items: center; }
  .client-name { font-size: 16px; font-weight: 600; color: var(--grey); }
  .client-services { font-size: 12px; color: var(--grey); opacity: 0.8; margin-top: 3px; }

  .dots-row { display: flex; gap: 6px; margin-top: 12px; }
  .dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    border: 2px solid var(--grey-light);
    color: var(--grey-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .dot.done { background: var(--magenta); border-color: var(--magenta); color: white; }
  .dot:hover { border-color: var(--magenta); }

  .next-session-tag {
    font-size: 12px;
    color: var(--magenta-dark);
    font-weight: 500;
    margin-top: 10px;
    background: var(--pink-pale);
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .search-bar {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--grey-light);
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 20px;
    font-family: 'DM Sans', sans-serif;
  }
  .search-bar:focus { outline: none; border-color: var(--magenta); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(105, 103, 104, 0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-box {
    background: white;
    border-radius: 16px;
    padding: 32px;
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-box h2 { font-family: 'Cormorant Garamond', serif; color: var(--magenta-dark); font-size: 22px; margin-bottom: 4px; }
  .session-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--grey-light);
  }
  .session-row:last-child { border-bottom: none; }
  .session-checkbox {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: 2px solid var(--grey-light);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .session-checkbox.checked { background: var(--ok); border-color: var(--ok); color: white; }
  .session-label { font-size: 14px; color: var(--grey); }
  .close-btn {
    margin-top: 24px;
    width: 100%;
    background: var(--grey-light);
    color: var(--grey);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: white;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--grey-light);
  }
  .stat-box .num { font-size: 30px; font-weight: 700; color: var(--magenta-dark); font-family: 'Cormorant Garamond', serif; }
  .stat-box .label { font-size: 12px; color: var(--grey); margin-top: 2px; }
  .month-selector { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
  .month-selector select {
    padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--grey-light);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
  }
  .service-row {
    display: flex; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--grey-light);
    font-size: 14px;
  }
  .service-row:last-child { border-bottom: none; }
  .loading { text-align: center; padding: 60px; color: var(--grey); font-size: 14px; }

  /* New client / package selection */
  .add-client-btn {
    background: var(--magenta);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 18px;
  }
  .add-client-btn:hover { background: var(--magenta-dark); }
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--grey);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    display: block;
    margin-bottom: 5px;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--grey-light);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: white;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--magenta); }
  .pkg-option {
    border: 1.5px solid var(--grey-light);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pkg-option.selected { border-color: var(--magenta); background: var(--pink-pale); }
  .pkg-option .pname { font-size: 14px; font-weight: 600; color: var(--grey); }
  .pkg-option .pprice { font-size: 13px; color: var(--magenta-dark); font-weight: 600; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-secondary {
    flex: 1;
    background: var(--grey-light);
    color: var(--grey);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-confirm {
    flex: 1;
    background: var(--magenta);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }
  .btn-confirm:disabled { background: var(--grey-light); cursor: not-allowed; }

  /* Client profile card */
  .balance-tag { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .balance-tag.paid { background: var(--ok-bg); color: var(--ok); }
  .balance-tag.owed { background: #FEF3CD; color: #92400E; }
  .component-block { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--grey-light); }
  .component-label { font-size: 13px; font-weight: 600; color: var(--grey); margin-bottom: 8px; }
  .count-control { display: flex; align-items: center; gap: 10px; }
  .count-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--grey-light);
    background: white;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--grey);
  }
  .count-btn:hover { border-color: var(--magenta); }
  .count-display { font-size: 14px; font-weight: 600; color: var(--grey); min-width: 50px; text-align: center; }

  /* Payment ledger */
  .ledger-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--grey-light); font-size: 13px; }
  .ledger-row:last-child { border-bottom: none; }
  .payment-form-row { display: flex; gap: 8px; margin-top: 12px; }
  .payment-form-row input { flex: 1; }
  .btn-small {
    background: var(--magenta);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  /* Weekly Divers summary */
  .week-picker { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
  .week-picker input { padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--grey-light); font-family: 'DM Sans', sans-serif; font-size: 14px; }
  .divers-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--grey-light); font-size: 13px; }
  .divers-row:last-child { border-bottom: none; }
  .divers-total { display: flex; justify-content: space-between; padding: 14px 0 0; font-size: 15px; font-weight: 700; color: var(--magenta-dark); }

  /* Invoice document */
  .invoice-controls { margin-bottom: 24px; }
  .invoice-controls .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .invoice-controls label { font-size: 12px; color: var(--grey); white-space: nowrap; }
  .invoice-controls input[type="date"], .invoice-controls input[type="text"] {
    padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--grey-light);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
  }
  .other-service-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .other-service-row input { flex: 1; }
  .other-service-row input.amount { flex: 0 0 110px; }
  .btn-remove-row {
    background: transparent; border: none; color: var(--magenta-dark);
    cursor: pointer; font-size: 16px; padding: 0 8px;
  }
  .add-row-btn {
    background: transparent; border: 1.5px dashed var(--grey-light); color: var(--grey);
    border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; margin-top: 4px;
  }
  .invoice-doc {
    background: white;
    padding: 40px;
    border-radius: 4px;
    border: 1px solid var(--grey-light);
    color: #2A2829;
    font-family: 'DM Sans', sans-serif;
    max-width: 800px;
  }
  .invoice-doc .inv-header { display: flex; gap: 20px; margin-bottom: 24px; }
  .invoice-doc .inv-logo { width: 80px; height: 80px; object-fit: contain; flex-shrink: 0; }
  .invoice-doc .inv-business-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
  .invoice-doc .inv-addr { font-size: 11px; color: #696768; line-height: 1.6; margin-top: 10px; }
  .invoice-doc .inv-meta { font-size: 13px; line-height: 1.7; margin: 20px 0; }
  .invoice-doc .inv-meta strong { font-weight: 700; }
  .invoice-doc table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 13px; }
  .invoice-doc th, .invoice-doc td { border: 1px solid #2A2829; padding: 10px; text-align: center; }
  .invoice-doc th { font-weight: 700; }
  .invoice-doc .inv-totals { display: flex; justify-content: flex-end; margin-top: 20px; }
  .invoice-doc .inv-totals table { width: 280px; }
  .invoice-doc .inv-totals td:first-child { text-align: left; font-weight: 700; }
  .invoice-doc .inv-words { margin-top: 30px; font-size: 13px; }
  .invoice-doc .inv-signature { margin-top: 60px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: #696768; }
  .invoice-actions { display: flex; gap: 10px; margin-top: 20px; max-width: 800px; }
  .btn-print {
    background: var(--magenta); color: white; border: none; border-radius: 10px;
    padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-print:disabled { background: var(--grey-light); cursor: not-allowed; }
  @media print {
    /* Hide app chrome and any non-invoice UI inside the modal */
    .sidebar, .invoice-controls, .invoice-actions, .page-title, .page-sub,
    .close-btn, .btn-print, .btn-secondary, .btn-confirm, .btn-small,
    .component-block, .assign-chips, .modal-actions { display: none !important; }

    /* Neutralize the modal overlay/box so it doesn't print as a scrolling
       panel with a scrollbar — let the invoice flow on the page normally. */
    .modal-overlay {
      position: static !important; background: none !important;
      display: block !important; padding: 0 !important;
    }
    .modal-box {
      box-shadow: none !important; border: none !important;
      max-width: 100% !important; max-height: none !important;
      overflow: visible !important; padding: 0 !important; margin: 0 !important;
      width: 100% !important;
    }
    .main { padding: 0 !important; }
    html, body { overflow: visible !important; height: auto !important; }

    /* Only the invoice document should print */
    .invoice-doc { border: none !important; max-width: 100% !important; box-shadow: none !important; }
  }

  /* Client import review */
  .import-card {
    background: white; border-radius: 12px; padding: 16px 18px;
    margin-bottom: 10px; border: 1px solid var(--grey-light);
  }
  .import-card.skip { opacity: 0.5; }
  .import-row-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .import-name { font-size: 15px; font-weight: 600; color: var(--grey); }
  .import-phone { font-size: 12px; color: var(--grey); opacity: 0.8; }
  .import-sources { font-size: 11px; color: var(--grey); opacity: 0.7; margin-top: 4px; }
  .confidence-tag { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; text-transform: uppercase; }
  .confidence-tag.likely { background: var(--ok-bg); color: var(--ok); }
  .confidence-tag.needs-review { background: #FEF3CD; color: #92400E; }
  .import-pkg-select { margin-top: 10px; }
  .import-pkg-select select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1.5px solid var(--grey-light); font-size: 13px; font-family: 'DM Sans', sans-serif; }
  .import-skip-toggle { font-size: 12px; color: var(--magenta-dark); cursor: pointer; text-decoration: underline; margin-top: 8px; display: inline-block; }
  .import-summary { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  /* Staff assignment chips */
  .assign-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .assign-chip {
    font-size: 13px; padding: 7px 14px; border-radius: 20px;
    border: 1.5px solid var(--grey-light); cursor: pointer;
    color: var(--grey); background: white; user-select: none;
  }
  .assign-chip.on { background: var(--magenta); border-color: var(--magenta); color: white; }

  /* Calendar */
  .cal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .cal-title { font-size: 18px; font-weight: 600; color: var(--magenta-dark); font-family: 'Cormorant Garamond', serif; min-width: 180px; text-align: center; }
  .cal-nav-btn {
    background: white; border: 1.5px solid var(--grey-light); border-radius: 8px;
    width: 34px; height: 34px; cursor: pointer; font-size: 16px; color: var(--grey);
  }
  .cal-nav-btn:hover { border-color: var(--magenta); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-dow { font-size: 11px; font-weight: 600; color: var(--grey); text-transform: uppercase; text-align: center; padding: 4px 0; letter-spacing: 0.04em; }
  .cal-cell {
    background: white; border: 1px solid var(--grey-light); border-radius: 8px;
    min-height: 92px; padding: 6px; display: flex; flex-direction: column; gap: 3px;
  }
  .cal-cell.empty { background: transparent; border: none; }
  .cal-cell.today { border-color: var(--magenta); border-width: 2px; }
  .cal-daynum { font-size: 12px; font-weight: 600; color: var(--grey); margin-bottom: 2px; }
  .cal-cell.today .cal-daynum { color: var(--magenta-dark); }
  .cal-event {
    font-size: 10px; line-height: 1.25; padding: 3px 5px; border-radius: 5px;
    background: var(--pink-pale); color: var(--magenta-dark); cursor: pointer;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cal-event:hover { background: var(--magenta-light); }
  .cal-more { font-size: 10px; color: var(--grey); padding: 1px 5px; }
  .cal-day-detail { background: white; border: 1px solid var(--grey-light); border-radius: 10px; padding: 16px; margin-top: 16px; }

    .shell { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 14px; }
    .sidebar .brand, .sidebar .staff-name, .nav-spacer, .logout-link { display: none; }
    .main { padding: 20px; }
  }
</style>

function apiCall(params) {
  const url = API_URL + "?" + new URLSearchParams(params).toString();
  return fetch(url).then(r => r.json());
}

const FR_MONTHS_SHARED = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
function frenchMonthForDate(d) {
  const dt = d ? new Date(d) : new Date();
  return FR_MONTHS_SHARED[dt.getMonth()];
}
function defaultObjet(d) {
  return "Prestation de service mois de " + frenchMonthForDate(d);
}

// Opens a clean, branded print window with the given title and inner HTML.
// Used for all the printable views (profiles, calendar, client lists, etc.).
// escapeHtml keeps client-entered text safe inside the generated markup.
function escapeHtml(s) {
  return String(s === null || s === undefined ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// ─── WhatsApp message flow helpers ───
// Builds a wa.me link that opens WhatsApp with a pre-written message. The
// person still taps send — this is not automated sending.
function waLink(phone, message) {
  const digits = String(phone || "").replace(/[^\d]/g, "");
  return "https://wa.me/" + digits + "?text=" + encodeURIComponent(message);
}
function firstName(name) {
  return String(name || "").trim().split(" ")[0] || "there";
}
function msgConfirmation(a, lang) {
  if (lang === "fr") {
    return "Bonjour " + firstName(a.clientName) + " ! 💛 Ceci confirme votre rendez-vous avec Joyful Birth Services" +
      (a.service ? " pour " + a.service : "") + " le " + a.date + (a.time ? " à " + a.time : "") +
      (a.location ? " (" + a.location + ")" : "") + ". Au plaisir de vous voir !";
  }
  return "Hello " + firstName(a.clientName) + "! 💛 This confirms your appointment with Joyful Birth Services" +
    (a.service ? " for " + a.service : "") + " on " + a.date + (a.time ? " at " + a.time : "") +
    (a.location ? " (" + a.location + ")" : "") + ". We look forward to seeing you!";
}
function msgReminder(a, lang) {
  if (lang === "fr") {
    return "Bonjour " + firstName(a.clientName) + " ! 💛 Petit rappel de votre rendez-vous avec Joyful Birth Services demain" +
      (a.time ? " à " + a.time : "") + (a.service ? " pour " + a.service : "") +
      (a.location ? " (" + a.location + ")" : "") + ". À demain !";
  }
  return "Hello " + firstName(a.clientName) + "! 💛 Just a friendly reminder of your appointment with Joyful Birth Services tomorrow" +
    (a.time ? " at " + a.time : "") + (a.service ? " for " + a.service : "") +

function msgFollowup(a, lang) {

function LockScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = () => {
    if (!pin) return;
    setLoading(true);
    setError("");
    apiCall({ action: "login", pin }).then(res => {
      setLoading(false);
      if (res.success) {
        localStorage.setItem("jbs_pin", pin);
        onLogin(res.staff, pin);
      } else {
        setError(res.error || "PIN not recognized");
      }
    }).catch(() => {
      setLoading(false);
      setError("Connection error — check your internet and try again");
    });
  };

  return (
    <div className="lock-screen">
      <div className="lock-card">
        <h1 className="display">Joyful Birth</h1>
        <p className="tagline">Staff Dashboard</p>
        <input
          className="pin-input"
          type="password"
          inputMode="numeric"
          maxLength={6}
          placeholder="••••"
          value={pin}
          onChange={e => setPin(e.target.value.replace(/\D/g, ""))}
          onKeyDown={e => e.key === "Enter" && submit()}
          autoFocus
        />
        <button className="btn-primary" onClick={submit} disabled={loading}>
          {loading ? "Checking..." : "Enter"}
        </button>
        {error && <p className="error-text">{error}</p>}
      </div>
    </div>
  );
}

function formatDateBlock(dateStr) {
  if (!dateStr) return { day: "—", mon: "" };
  const d = new Date(dateStr);
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  return { day: d.getDate(), mon: months[d.getMonth()] };
}

function NewAppointmentModal({ pin, clients, packages, onClose, onCreated }) {
  const [useExisting, setUseExisting] = useState(true);
  const [clientId, setClientId] = useState("");
  const [freeName, setFreeName] = useState("");
  const [usePackage, setUsePackage] = useState(true);
  const [packageId, setPackageId] = useState("");
  const [customPrice, setCustomPrice] = useState("");
  const [title, setTitle] = useState("");
  const [date, setDate] = useState("");
  const [time, setTime] = useState("");
  const [duration, setDuration] = useState("60");
  const [location, setLocation] = useState("Sousse");
  const [notes, setNotes] = useState("");
  const [saving, setSaving] = useState(false);
  const [warn, setWarn] = useState("");
  const [justBooked, setJustBooked] = useState(null); // holds appt info after save for the confirm-send step
  const [confirmLang, setConfirmLang] = useState("en");

  const selectedClient = clients.find(c => c.id === clientId);
  const clientName = useExisting ? (selectedClient ? selectedClient.name : "") : freeName;
  const selectedPkg = (packages || []).find(p => p.id === packageId);
  const serviceLabel = usePackage ? (selectedPkg ? selectedPkg.name : "") : title;
  const canSave = clientName.trim() && serviceLabel.trim() && date && time;

  const save = () => {
    if (!canSave) return;
    setSaving(true);
    setWarn("");
    const payload = {
      action: "createAppointment",
      pin,
      clientName,
      phone: selectedClient ? selectedClient.phone : "",
      date,
      time,
      duration,
      location,
      notes
    };
    if (usePackage && selectedPkg) {
      payload.packageId = selectedPkg.id;
      if (customPrice) payload.basePrice = customPrice;
    } else {
      payload.title = title;
    }
    apiCall(payload).then(res => {
      setSaving(false);
      if (res.success) {
        if (res.calendarOk === false) {
          setWarn("Appointment saved to the sheet, but the calendar event couldn't be created. You may need to re-authorize calendar access.");
        }
        // Move to the confirmation-send step (don't close yet)
        setJustBooked({
          clientName,
          phone: selectedClient ? selectedClient.phone : "",
          service: serviceLabel,
          date,
          time,
          location
        });
      }
    });
  };

  // After booking: a step offering the one-tap WhatsApp confirmation
  if (justBooked) {
    const hasPhone = String(justBooked.phone || "").replace(/[^\d]/g, "").length > 0;
    return (
      <div className="modal-overlay" onClick={onCreated}>
        <div className="modal-box" onClick={e => e.stopPropagation()} style={{maxWidth: 440}}>
          <h2>Appointment booked ✓</h2>
          <p className="page-sub" style={{marginBottom: 16}}>
            {justBooked.clientName} · {justBooked.date}{justBooked.time ? " at " + justBooked.time : ""}
          </p>
          {warn && <p style={{fontSize: 12, color: "#92400E", marginBottom: 12}}>{warn}</p>}

          {hasPhone ? (
            <React.Fragment>
              <div className="assign-chips" style={{marginBottom: 10}}>
                <span className={"assign-chip" + (confirmLang === "en" ? " on" : "")} onClick={() => setConfirmLang("en")}>English</span>
                <span className={"assign-chip" + (confirmLang === "fr" ? " on" : "")} onClick={() => setConfirmLang("fr")}>Français</span>
              </div>
              <a
                href={waLink(justBooked.phone, msgConfirmation(justBooked, confirmLang))}
                target="_blank"
                rel="noopener noreferrer"
                className="btn-confirm"
                style={{display: "block", textAlign: "center", textDecoration: "none", marginBottom: 8}}
              >
                Send WhatsApp confirmation
              </a>
            </React.Fragment>
          ) : (
            <p style={{fontSize: 12, color: "var(--grey)", marginBottom: 8}}>No phone number on file for this client, so no WhatsApp confirmation can be sent.</p>
          )}
          <button className="btn-secondary" onClick={onCreated}>Done</button>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <h2>New appointment</h2>
        <p className="page-sub" style={{marginBottom: 18}}>Adds to your Bookings sheet and Google Calendar</p>

        <div className="form-group">
          <label className="form-label">Client</label>
          <div className="assign-chips" style={{marginBottom: 10}}>
            <span className={"assign-chip" + (useExisting ? " on" : "")} onClick={() => setUseExisting(true)}>Existing client</span>
            <span className={"assign-chip" + (!useExisting ? " on" : "")} onClick={() => setUseExisting(false)}>One-off name</span>
          </div>
          {useExisting ? (
            <select className="form-select" value={clientId} onChange={e => setClientId(e.target.value)}>
              <option value="">Choose a client...</option>
              {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          ) : (
            <input className="form-input" value={freeName} onChange={e => setFreeName(e.target.value)} placeholder="Name" />
          )}
        </div>

        <div className="form-group">
          <label className="form-label">Service</label>
          <div className="assign-chips" style={{marginBottom: 10}}>
            <span className={"assign-chip" + (usePackage ? " on" : "")} onClick={() => setUsePackage(true)}>Package</span>
            <span className={"assign-chip" + (!usePackage ? " on" : "")} onClick={() => setUsePackage(false)}>Other (free text)</span>
          </div>
          {usePackage ? (
            <React.Fragment>
              <select className="form-select" value={packageId} onChange={e => setPackageId(e.target.value)}>
                <option value="">Choose a package...</option>
                {(packages || []).map(p => <option key={p.id} value={p.id}>{p.name} — {p.price} TND</option>)}
              </select>
              {selectedPkg && (
                <input className="form-input" type="number" style={{marginTop: 8}} placeholder={"Price: " + selectedPkg.price + " TND (leave blank for default)"} value={customPrice} onChange={e => setCustomPrice(e.target.value)} />
              )}
            </React.Fragment>
          ) : (
            <input className="form-input" value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. CBE Session 2, Birth doula prenatal" />
          )}
        </div>

        <div className="form-group" style={{display: "flex", gap: 10}}>
          <div style={{flex: 1}}>
            <label className="form-label">Date</label>
            <input className="form-input" type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>
          <div style={{flex: 1}}>
            <label className="form-label">Time</label>
            <input className="form-input" type="time" value={time} onChange={e => setTime(e.target.value)} />
          </div>
        </div>

        <div className="form-group" style={{display: "flex", gap: 10}}>
          <div style={{flex: 1}}>
            <label className="form-label">Duration (min)</label>
            <input className="form-input" type="number" value={duration} onChange={e => setDuration(e.target.value)} />
          </div>
          <div style={{flex: 1}}>
            <label className="form-label">Location</label>
            <select className="form-select" value={location} onChange={e => setLocation(e.target.value)}>
              <option value="Sousse">Sousse</option>
              <option value="Tunis">Tunis</option>
            </select>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Notes (optional)</label>
          <textarea className="form-input" rows={2} style={{resize: "vertical"}} value={notes} onChange={e => setNotes(e.target.value)} />
        </div>

        {warn && <p style={{fontSize: 12, color: "#92400E", marginBottom: 10}}>{warn}</p>}

        <div className="modal-actions">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-confirm" disabled={!canSave || saving} onClick={save}>
            {saving ? "Creating..." : "Create appointment"}
          </button>
        </div>
      </div>
    </div>
  );
}

    </div>
  );
}

function ComponentTracker({ client, component, pin, onUpdated }) {
  const prog = client.progress[component.id];

  if (component.type === "sessions") {
    const sessions = component.sessions;
    const stateArr = Array.isArray(prog) ? prog : [];
    const isDone = (sid) => !!(stateArr.find(s => s.id === sid) || {}).completed;
    const nextSession = sessions.find(s => !isDone(s.id));

    const toggle = (sessionId, current) => {
      apiCall({
        action: "updateClientComponent",
        pin,
        clientId: client.id,
        componentId: component.id,
        sessionId,
        completed: !current
      }).then(() => onUpdated());
    };

    return (
      <div className="component-block">
        <div className="component-label">{component.label}</div>
        <div className="dots-row">
          {sessions.map(s => (
            <div
              key={s.id}
              className={"dot" + (isDone(s.id) ? " done" : "")}
              onClick={() => toggle(s.id, isDone(s.id))}
              title={s.name}
            >
              {s.id}
            </div>
          ))}
        </div>
        {nextSession ? (
          <div className="next-session-tag">Next up: {nextSession.name}</div>
        ) : (
          <div className="next-session-tag">All sessions complete</div>
        )}
      </div>
    );
  }

  // count-type component
  const done = (prog && typeof prog.done === "number") ? prog.done : 0;
  const target = component.target || 1;

  const setDone = (newDone) => {
    const clamped = Math.max(0, Math.min(newDone, target));
    apiCall({
      action: "updateClientComponent",
      pin,
      clientId: client.id,
      componentId: component.id,
      done: clamped
    }).then(() => onUpdated());
  };

  return (
    <div className="component-block">
      <div className="component-label">{component.label}{component.optional ? " (optional)" : ""}</div>
      <div className="count-control">
        <button className="count-btn" onClick={() => setDone(done - 1)}>−</button>
        <span className="count-display">{done} / {target}</span>
        <button className="count-btn" onClick={() => setDone(done + 1)}>+</button>
      </div>
    </div>
  );
}

function MergeClientsModal({ pin, onClose, onMerged }) {
  const [groups, setGroups] = useState(null);
  const [primary, setPrimary] = useState({});   // groupKey -> clientId
  const [picked, setPicked] = useState({});     // groupKey -> { clientId: true }
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  const load = () => {
    apiCall({ action: "findDuplicateClients", pin }).then(res => {
      if (res.success) {
        setGroups(res.groups);
        // Default: oldest profile is primary, all others ticked to merge in
        const p = {}, k = {};
        res.groups.forEach(g => {
          p[g.key] = g.clients[0].id;
          k[g.key] = {};
          g.clients.slice(1).forEach(c => { k[g.key][c.id] = true; });
        });
        setPrimary(p);
        setPicked(k);
      }
    });
  };
  useEffect(() => { load(); }, []);

  const toggle = (gk, id) => setPicked(prev => ({ ...prev, [gk]: { ...prev[gk], [id]: !(prev[gk] || {})[id] } }));

  const mergeGroup = (g) => {
    const primaryId = primary[g.key];
    const mergeIds = Object.keys(picked[g.key] || {}).filter(id => picked[g.key][id] && id !== primaryId);
    if (!primaryId || mergeIds.length === 0) { setMsg("Pick a profile to keep, and at least one to merge into it."); return; }
    setBusy(true);
    setMsg("");
    apiCall({
      action: "mergeClients", pin,
      primaryId,
      mergeIds: JSON.stringify(mergeIds)
    }).then(res => {
      setBusy(false);
      if (res && res.success) {
        const m = res.moved || {};
        setMsg("Merged " + res.merged + " profile" + (res.merged !== 1 ? "s" : "") +
          " — moved " + (m.appointments || 0) + " appointments, " + (m.payments || 0) + " payments, " +
          (m.charges || 0) + " charges.");
        load();
        if (onMerged) onMerged();
      } else {
        setMsg((res && res.error) ? res.error : "Could not merge.");
      }
    }).catch(() => { setBusy(false); setMsg("Couldn't reach the server."); });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()} style={{maxWidth: 560}}>
        <h2>Consolidate duplicate clients</h2>
        <p className="page-sub" style={{marginBottom: 14}}>
          Profiles that look like the same person (matched by phone, or by name when there's no phone). Choose which profile to keep — everything from the others (appointments, payments, charges, payment plans) moves onto it.
        </p>

        {msg && <div style={{background: "var(--ok-bg)", color: "var(--ok)", borderRadius: 8, padding: "8px 12px", marginBottom: 12, fontSize: 12}}>{msg}</div>}

        {!groups && <div className="loading">Looking for duplicates...</div>}
        {groups && groups.length === 0 && (
          <p style={{fontSize: 13, color: "var(--grey)"}}>No duplicate profiles found.</p>
        )}

        {groups && groups.map(g => (
          <div className="component-block" key={g.key}>
            <div className="component-label">
              {g.clients[0].name} — {g.clients.length} profiles (matched on {g.matchedOn})
            </div>
            {g.clients.map(c => (
              <div className="ledger-row" key={c.id} style={{alignItems: "center"}}>
                <label style={{display: "flex", alignItems: "center", gap: 8, cursor: "pointer", flex: 1}}>
                  <input
                    type="radio"
                    name={"primary-" + g.key}
                    checked={primary[g.key] === c.id}
                    onChange={() => setPrimary(prev => ({ ...prev, [g.key]: c.id }))}
                  />
                  <span>
                    <span style={{fontWeight: primary[g.key] === c.id ? 600 : 400}}>{c.name}</span>
                    <span style={{fontSize: 11, color: "var(--grey)", display: "block"}}>
                      {c.packageId || "no package"}{c.phone ? " · " + c.phone : ""}
                    </span>
                  </span>
                </label>
                {primary[g.key] === c.id ? (
                  <span style={{fontSize: 11, color: "var(--magenta-dark)"}}>keep this one</span>
                ) : (
                  <label style={{fontSize: 11, color: "var(--grey)", display: "flex", alignItems: "center", gap: 4, cursor: "pointer"}}>
                    <input type="checkbox" checked={!!(picked[g.key] || {})[c.id]} onChange={() => toggle(g.key, c.id)} />
                    merge in
                  </label>
                )}
              </div>
            ))}
            <button className="btn-small" style={{marginTop: 8}} disabled={busy} onClick={() => mergeGroup(g)}>
              {busy ? "Merging..." : "Merge into “" + (g.clients.find(c => c.id === primary[g.key]) || {}).name + "”"}
            </button>
          </div>
        ))}

        <p style={{fontSize: 11, color: "var(--grey)", marginTop: 10}}>
          Merging can't be undone. The kept profile gains all the history; the others are removed. Any different packages they had are noted on the kept profile.
        </p>
        <button className="btn-secondary" style={{marginTop: 10}} onClick={onClose}>Done</button>
      </div>
    </div>
  );
}

function PaymentPlan({ client, pin, onUpdated }) {
  const [plan, setPlan] = useState(null);
  const [dueDate, setDueDate] = useState("");
  const [amount, setAmount] = useState("");
  const [label, setLabel] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  const load = () => {
    apiCall({ action: "getPaymentPlan", pin, clientId: client.id }).then(res => {
      if (res.success) setPlan(res);
    });
  };
  useEffect(() => { load(); }, [client.id]);

  const add = () => {
    if (!amount) { setMsg("Enter an amount."); return; }
    setBusy(true);
    apiCall({ action: "addPlanInstallment", pin, clientId: client.id, dueDate, amount, label }).then(res => {
      setBusy(false);
      if (res.success) { setDueDate(""); setAmount(""); setLabel(""); setMsg(""); load(); }
      else setMsg(res.error || "Could not add.");
    });
  };

  const markPaid = (it) => {
    setBusy(true);
    apiCall({
      action: "markInstallmentPaid", pin, planId: it.id,
      clientId: client.id, clientName: client.name
    }).then(res => {
      setBusy(false);
      if (res.success) { load(); if (onUpdated) onUpdated(); }
      else setMsg(res.error || "Could not mark paid.");
    });
  };

  const toggleInvoiced = (it) => {
    apiCall({ action: "updatePlanInstallment", pin, planId: it.id, invoiced: it.invoiced ? "no" : "yes" }).then(res => {
      if (res.success) load();
    });
  };

  const remove = (it) => {
    apiCall({ action: "deletePlanInstallment", pin, planId: it.id }).then(res => {
      if (res.success) load();
    });
  };

  return (
    <div className="component-block">
      <div className="component-label">Payment plan</div>
      <p style={{fontSize: 11, color: "var(--grey)", marginBottom: 10}}>
        Schedule what's due when — useful for package clients spread over months. Marking one paid records it in the payment ledger below.
      </p>

      {!plan && <p style={{fontSize: 12, color: "var(--grey)"}}>Loading...</p>}

      {plan && plan.toInvoiceCount > 0 && (
        <div style={{background: "#FBE9F1", color: "var(--magenta-dark)", borderRadius: 8, padding: "8px 12px", marginBottom: 10, fontSize: 12}}>
          <strong>Ready to invoice:</strong> {plan.toInvoiceCount} paid installment{plan.toInvoiceCount !== 1 ? "s" : ""} ({plan.toInvoiceTotal} TND) not yet marked invoiced.
        </div>
      )}

      {plan && plan.items.length === 0 && (
        <p style={{fontSize: 12, color: "var(--grey)", marginBottom: 8}}>No installments scheduled yet.</p>
      )}

      {plan && plan.items.map(it => (
        <div className="ledger-row" key={it.id} style={{alignItems: "center"}}>
          <div style={{flex: 1}}>
            <div style={{fontSize: 13, fontWeight: 600}}>
              {it.amount} TND {it.label ? "· " + it.label : ""}
            </div>
            <div style={{fontSize: 11, color: "var(--grey)"}}>
              {it.status === "paid"
                ? "Paid" + (it.paidDate ? " " + it.paidDate : "")
                : (it.dueDate ? "Due " + it.dueDate : "No due date")}
              {it.status === "paid" && (it.invoiced ? " · invoiced" : " · not invoiced")}
            </div>
          </div>
          <span style={{display: "flex", gap: 8, alignItems: "center", whiteSpace: "nowrap"}}>
            {it.status !== "paid" && (
              <span style={{fontSize: 11, color: "var(--magenta-dark)", cursor: "pointer", textDecoration: "underline"}} onClick={() => markPaid(it)}>mark paid</span>
            )}
            {it.status === "paid" && (
              <span style={{fontSize: 11, color: "var(--grey)", cursor: "pointer", textDecoration: "underline"}} onClick={() => toggleInvoiced(it)}>
                {it.invoiced ? "un-invoice" : "mark invoiced"}
              </span>
            )}
            <span style={{fontSize: 11, color: "#C0392B", cursor: "pointer"}} onClick={() => remove(it)}>×</span>
          </span>
        </div>
      ))}

      {plan && plan.items.length > 0 && (
        <div className="ledger-row" style={{fontWeight: 600, borderTop: "1.5px solid var(--grey-light)", marginTop: 4}}>
          <span>Planned {plan.plannedTotal} · Paid {plan.paidTotal}</span>
          <span>{plan.outstanding > 0 ? plan.outstanding + " TND left" : "Fully paid"}</span>
        </div>
      )}

      <div style={{display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap"}}>
        <input className="form-input" type="date" style={{flex: "1 1 120px"}} value={dueDate} onChange={e => setDueDate(e.target.value)} />
        <input className="form-input" type="number" style={{flex: "0 1 90px"}} placeholder="Amount" value={amount} onChange={e => setAmount(e.target.value)} />
        <input className="form-input" style={{flex: "1 1 120px"}} placeholder="e.g. Deposit" value={label} onChange={e => setLabel(e.target.value)} />
        <button className="btn-small" disabled={busy} onClick={add}>Add</button>
      </div>
      {msg && <p style={{fontSize: 11, color: "var(--magenta-dark)", marginTop: 6}}>{msg}</p>}
    </div>
  );
}

function PaymentLedger({ client, pin, onUpdated, packages }) {
  const [ledger, setLedger] = useState(null);
  const [amount, setAmount] = useState("");
  const [method, setMethod] = useState("");
  const [svcDesc, setSvcDesc] = useState("");
  const [svcAmount, setSvcAmount] = useState("");
  const [busy, setBusy] = useState(false);
  const [editId, setEditId] = useState(null); // id of the payment/charge being edited
  const [editA, setEditA] = useState("");
  const [editB, setEditB] = useState("");

  const load = () => {
    apiCall({ action: "getClientLedger", pin, clientId: client.id }).then(res => {
      if (res.success) setLedger(res);
    });
  };

  useEffect(() => { load(); }, [client.id]);

  const refresh = () => { load(); onUpdated(); };

  const addPaymentEntry = () => {
    if (!amount) return;
    setBusy(true);
    apiCall({ action: "addPayment", pin, clientId: client.id, clientName: client.name, amount, method }).then(() => {
      setAmount(""); setMethod(""); setBusy(false); refresh();
    });
  };

  const addService = () => {
    if (!svcDesc || !svcAmount) return;
    setBusy(true);
    apiCall({ action: "addCharge", pin, clientId: client.id, description: svcDesc, amount: svcAmount }).then(() => {
      setSvcDesc(""); setSvcAmount(""); setBusy(false); refresh();
    });
  };

  const startEditPayment = (p) => { setEditId(p.id); setEditA(String(p.amount)); setEditB(p.method || ""); };
  const startEditCharge = (c) => { setEditId(c.id); setEditA(String(c.amount)); setEditB(c.description || ""); };
  const cancelEdit = () => { setEditId(null); setEditA(""); setEditB(""); };

  const saveEditPayment = (id) => {
    setBusy(true);
    apiCall({ action: "updatePayment", pin, paymentId: id, amount: editA, method: editB }).then(() => {
      setBusy(false); cancelEdit(); refresh();
    });
  };
  const saveEditCharge = (id) => {
    setBusy(true);
    apiCall({ action: "updateCharge", pin, chargeId: id, amount: editA, description: editB }).then(() => {
      setBusy(false); cancelEdit(); refresh();
    });
  };
  const removePayment = (id) => {
    apiCall({ action: "deletePayment", pin, paymentId: id }).then(() => refresh());
  };
  const removeCharge = (id) => {
    apiCall({ action: "deleteCharge", pin, chargeId: id }).then(() => refresh());
  };

  if (!ledger) return <div className="component-block"><div className="loading">Loading payments...</div></div>;

  return (
    <div className="component-block">
      <div className="component-label">Payments &amp; balance</div>
      <div className="ledger-row" style={{fontWeight: 600}}>
        <span>Owed: {ledger.totalOwed} TND</span>
        <span className={"balance-tag" + (ledger.balance <= 0 ? " paid" : " owed")}>
          {ledger.balance <= 0 ? "Paid in full" : ledger.balance + " TND remaining"}
        </span>
      </div>
      <div className="ledger-row" style={{fontSize: 12, color: "var(--grey)"}}>
        <span>Package: {ledger.packagePrice} TND{ledger.addOnTotal > 0 ? " + add-ons " + ledger.addOnTotal + " TND" : ""}</span>
        <span>Paid: {ledger.totalPaid} TND</span>
      </div>

      {(ledger.charges || []).length > 0 && (
        <div style={{marginTop: 8}}>
          <div style={{fontSize: 12, fontWeight: 600, color: "var(--magenta-dark)", marginBottom: 4}}>Add-on services</div>
          {ledger.charges.map(c => (
            editId === c.id ? (
              <div className="payment-form-row" key={c.id} style={{marginBottom: 6}}>
                <input className="form-input" value={editB} onChange={e => setEditB(e.target.value)} placeholder="Description" />
                <input className="form-input" type="number" value={editA} onChange={e => setEditA(e.target.value)} placeholder="TND" style={{maxWidth: 90}} />
                <button className="btn-small" onClick={() => saveEditCharge(c.id)} disabled={busy}>Save</button>
                <button className="btn-remove-row" onClick={cancelEdit}>×</button>
              </div>
            ) : (
              <div className="ledger-row" key={c.id}>
                <span>{c.date ? c.date + " · " : ""}{c.description}</span>
                <span style={{display: "flex", alignItems: "center", gap: 8}}>
                  +{c.amount} TND
                  <span style={{fontSize: 11, color: "var(--magenta-dark)", cursor: "pointer", textDecoration: "underline"}} onClick={() => startEditCharge(c)}>edit</span>
                  <span style={{fontSize: 11, color: "#C0392B", cursor: "pointer"}} onClick={() => removeCharge(c.id)}>delete</span>
                </span>
              </div>
            )
          ))}
        </div>
      )}

      {ledger.payments.length > 0 && (
        <div style={{marginTop: 8}}>
          <div style={{fontSize: 12, fontWeight: 600, color: "var(--magenta-dark)", marginBottom: 4}}>Payments received</div>
          {ledger.payments.map(p => (
            editId === p.id ? (
              <div className="payment-form-row" key={p.id} style={{marginBottom: 6}}>
                <input className="form-input" type="number" value={editA} onChange={e => setEditA(e.target.value)} placeholder="Amount" style={{maxWidth: 110}} />
                <input className="form-input" value={editB} onChange={e => setEditB(e.target.value)} placeholder="Method" />
                <button className="btn-small" onClick={() => saveEditPayment(p.id)} disabled={busy}>Save</button>
                <button className="btn-remove-row" onClick={cancelEdit}>×</button>
              </div>
            ) : (
              <div className="ledger-row" key={p.id}>
                <span>{p.date}{p.method ? " · " + p.method : ""}</span>
                <span style={{display: "flex", alignItems: "center", gap: 8}}>
                  {p.amount} TND
                  <span style={{fontSize: 11, color: "var(--magenta-dark)", cursor: "pointer", textDecoration: "underline"}} onClick={() => startEditPayment(p)}>edit</span>
                  <span style={{fontSize: 11, color: "#C0392B", cursor: "pointer"}} onClick={() => removePayment(p.id)}>delete</span>
                </span>
              </div>
            )
          ))}
        </div>
      )}

      <div className="payment-form-row" style={{marginTop: 10}}>
        <input className="form-input" type="number" placeholder="Payment amount" value={amount} onChange={e => setAmount(e.target.value)} />
        <input className="form-input" placeholder="Method (cash, transfer...)" value={method} onChange={e => setMethod(e.target.value)} />
        <button className="btn-small" onClick={addPaymentEntry} disabled={busy}>Add payment</button>
      </div>

      <div className="payment-form-row" style={{marginTop: 6}}>
        <select
          className="form-select"
          value=""
          onChange={e => {
            const p = (packages || []).find(x => x.id === e.target.value);
            if (p) { setSvcDesc(p.name); setSvcAmount(String(p.price)); }
          }}
        >
          <option value="">+ Add one of your services...</option>
          {(packages || []).map(p => <option key={p.id} value={p.id}>{p.name} ({p.price} TND)</option>)}
        </select>
      </div>

      <div className="payment-form-row" style={{marginTop: 6}}>
        <input className="form-input" placeholder="Add-on service (e.g. extra session)" value={svcDesc} onChange={e => setSvcDesc(e.target.value)} />
        <input className="form-input" type="number" placeholder="Price TND" value={svcAmount} onChange={e => setSvcAmount(e.target.value)} />
        <button className="btn-small" onClick={addService} disabled={busy}>Add service</button>
      </div>
    </div>
  );
}

            </div>
          </div>
          {b.when !== "unknown" && (
            <span style={{...whenStyle(b.when), fontSize: 10, fontWeight: 600, padding: "3px 8px", borderRadius: 20, whiteSpace: "nowrap", textTransform: "uppercase"}}>
              {whenLabel(b.when)}
            </span>
          )}
        </div>
      ))}
    </div>
  );
}

function AppointmentsLog({ client, pin }) {
  const [appts, setAppts] = useState(null);
  const [date, setDate] = useState("");
  const [title, setTitle] = useState("");
  const [notes, setNotes] = useState("");
  const [busy, setBusy] = useState(false);
  const [editId, setEditId] = useState(null);
  const [eDate, setEDate] = useState("");
  const [eTitle, setETitle] = useState("");
  const [eNotes, setENotes] = useState("");

  const load = () => {
    apiCall({ action: "getAppointments", pin, clientId: client.id }).then(res => {
      if (res.success) setAppts(res.appointments);
    });
  };

  useEffect(() => { load(); }, [client.id]);

  // Promoting a note into a real calendar booking
  const [bookingId, setBookingId] = useState(null); // which note is being booked
  const [bookTime, setBookTime] = useState("09:00");
  const [bookMsg, setBookMsg] = useState("");

  const startBook = (a) => { setBookingId(a.id); setBookTime("09:00"); setBookMsg(""); };
  const cancelBook = () => { setBookingId(null); setBookMsg(""); };
  const confirmBook = (a) => {
    if (!a.date) { setBookMsg("This note has no date — add one first (edit it), then book."); return; }
    setBusy(true);
    apiCall({
      action: "createAppointment",
      pin,
      clientName: client.name,
      phone: client.phone || "",
      title: a.title || "Appointment",
      date: a.date,
      time: bookTime,
      duration: "60",
      location: client.location || "",
      notes: a.notes || ""
    }).then(res => {
      setBusy(false);
      if (res.success) {
        setBookingId(null);
        setBookMsg("");
        // brief confirmation on the note itself
        setBookedJustNow(a.id);
        setTimeout(() => setBookedJustNow(null), 4000);
      } else {
        setBookMsg(res.error || "Could not book.");
      }
    });
  };
  const [bookedJustNow, setBookedJustNow] = useState(null);

  const add = () => {
    if (!date && !title && !notes) return;
    setBusy(true);
    apiCall({ action: "addAppointment", pin, clientId: client.id, date, title, notes }).then(() => {
      setDate(""); setTitle(""); setNotes(""); setBusy(false); load();
    });
  };

  const startEdit = (a) => { setEditId(a.id); setEDate(a.date || ""); setETitle(a.title || ""); setENotes(a.notes || ""); };
  const cancelEdit = () => { setEditId(null); setEDate(""); setETitle(""); setENotes(""); };
  const saveEdit = (id) => {
    setBusy(true);
    apiCall({ action: "updateAppointment", pin, appointmentId: id, date: eDate, title: eTitle, notes: eNotes }).then(() => {
      setBusy(false); cancelEdit(); load();
    });
  };
  const remove = (id) => {
    apiCall({ action: "deleteAppointment", pin, appointmentId: id }).then(() => load());
  };

  return (
    <div className="component-block">
      <div className="component-label">Private notes</div>
      <p style={{fontSize: 11, color: "var(--grey)", margin: "0 0 8px"}}>
        For your own records — these stay in the profile. Use "Book on calendar" to also put one on the calendar and upcoming list.
      </p>
      {!appts && <div className="loading">Loading...</div>}
      {appts && appts.length === 0 && (
        <p style={{fontSize: 12, color: "var(--grey)", margin: "4px 0 8px"}}>No notes logged yet.</p>
      )}
      {appts && appts.map(a => (
        editId === a.id ? (
          <div key={a.id} style={{borderLeft: "2px solid var(--magenta)", paddingLeft: 10, marginBottom: 10}}>
            <div style={{display: "flex", gap: 6, marginBottom: 6}}>
              <input className="form-input" type="date" value={eDate} onChange={e => setEDate(e.target.value)} style={{flex: "0 0 150px"}} />
              <input className="form-input" value={eTitle} onChange={e => setETitle(e.target.value)} placeholder="Title" />
            </div>
            <textarea className="form-input" value={eNotes} onChange={e => setENotes(e.target.value)} rows={3} style={{width: "100%", resize: "vertical", fontFamily: "inherit"}} />
            <div style={{display: "flex", gap: 8, marginTop: 6}}>
              <button className="btn-small" onClick={() => saveEdit(a.id)} disabled={busy}>Save</button>
              <button className="btn-remove-row" onClick={cancelEdit}>×</button>
            </div>
          </div>
        ) : (
          <div key={a.id} style={{borderLeft: "2px solid var(--magenta)", paddingLeft: 10, marginBottom: 10}}>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8}}>
              <div style={{fontSize: 13, fontWeight: 600}}>{a.date}{a.title ? " · " + a.title : ""}</div>
              <span style={{display: "flex", gap: 8, whiteSpace: "nowrap"}}>
                <span style={{fontSize: 11, color: "var(--magenta-dark)", cursor: "pointer", textDecoration: "underline"}} onClick={() => startBook(a)}>book on calendar</span>
                <span style={{fontSize: 11, color: "var(--magenta-dark)", cursor: "pointer", textDecoration: "underline"}} onClick={() => startEdit(a)}>edit</span>
                <span style={{fontSize: 11, color: "#C0392B", cursor: "pointer"}} onClick={() => remove(a.id)}>delete</span>
              </span>
            </div>
            {a.notes && <div style={{fontSize: 13, color: "var(--grey)", whiteSpace: "pre-wrap", marginTop: 2}}>{a.notes}</div>}
            {bookingId === a.id && (
              <div style={{display: "flex", gap: 8, alignItems: "center", marginTop: 6, flexWrap: "wrap"}}>
                <span style={{fontSize: 12, color: "var(--grey)"}}>Time:</span>
                <input className="form-input" type="time" value={bookTime} onChange={e => setBookTime(e.target.value)} style={{flex: "0 0 120px"}} />
                <button className="btn-small" onClick={() => confirmBook(a)} disabled={busy}>{busy ? "Booking..." : "Confirm booking"}</button>
                <button className="btn-remove-row" onClick={cancelBook}>×</button>
              </div>
            )}
            {bookMsg && bookingId === a.id && <div style={{fontSize: 11, color: "#92400E", marginTop: 4}}>{bookMsg}</div>}
            {bookedJustNow === a.id && <div style={{fontSize: 11, color: "var(--ok)", marginTop: 4}}>Booked — now on the calendar and upcoming list.</div>}
          </div>
        )
      ))}
      <div style={{display: "flex", gap: 6, marginTop: 6}}>
        <input className="form-input" type="date" value={date} onChange={e => setDate(e.target.value)} style={{flex: "0 0 150px"}} />
        <input className="form-input" placeholder="What was it? (e.g. CBE Session 2)" value={title} onChange={e => setTitle(e.target.value)} />
      </div>
      <textarea className="form-input" placeholder="Notes from this appointment..." value={notes} onChange={e => setNotes(e.target.value)} rows={3} style={{marginTop: 6, width: "100%", resize: "vertical", fontFamily: "inherit"}} />
      <button className="btn-small" onClick={add} disabled={busy} style={{marginTop: 6}}>{busy ? "Saving..." : "Add note"}</button>
    </div>
  );
}

function ClientProfileModal({ client, packages, staffList, currentStaff, pin, onClose, onUpdated, onDeleted }) {
  const pkg = packages.find(p => p.id === client.packageId);
  const isOwner = currentStaff && currentStaff.role === "owner";
  const [inv, setInv] = useState(null);
  const [invoiceNumber, setInvoiceNumber] = useState("");
  const [objet, setObjet] = useState(defaultObjet());
  const [invLang, setInvLang] = useState("fr");
  const [generating, setGenerating] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [note, setNote] = useState("");
  const [editing, setEditing] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleting, setDeleting] = useState(false);
  const [deleteErr, setDeleteErr] = useState("");

  // Edit form state — seeded from the current client
  const [eName, setEName] = useState(client.name);
  const [ePhone, setEPhone] = useState(client.phone);
  const [eEmail, setEEmail] = useState(client.email || "");
  const [eLocation, setELocation] = useState(client.location || "Sousse");
  const [eStatus, setEStatus] = useState((client.status || "active").toLowerCase());
  const [ePackageId, setEPackageId] = useState(client.packageId);
  const [eCustomPrice, setECustomPrice] = useState(client.customPrice !== null && client.customPrice !== undefined ? String(client.customPrice) : "");
  const [eAssigned, setEAssigned] = useState(client.assignedStaff || []);
  const [eBabyName, setEBabyName] = useState(client.babyName || "");
  const [eBabyDate, setEBabyDate] = useState(client.babyBirthDate || "");
  const [eBabyWeight, setEBabyWeight] = useState(client.babyWeight || "");
  const [eBabyDetails, setEBabyDetails] = useState(client.babyBirthDetails || "");
  const [savingEdit, setSavingEdit] = useState(false);

  useEffect(() => {
    apiCall({ action: "getSuggestedInvoiceNumber", pin }).then(res => {
      if (res.success) setInvoiceNumber(res.suggested + "/" + res.year);
    });
  }, [pin]);

  const locations = ["Sousse", "Tunis"];
  const toggleAssigned = (staffName) => {
    setEAssigned(prev => prev.includes(staffName) ? prev.filter(s => s !== staffName) : [...prev, staffName]);
  };

  const saveEdit = () => {
    setSavingEdit(true);
    apiCall({
      action: "updateClient",
      pin,
      clientId: client.id,
      clientName: eName,
      phone: ePhone,
      email: eEmail,
      location: eLocation,
      status: eStatus,
      packageId: ePackageId,
      customPrice: eCustomPrice,
      assignedStaff: eAssigned.join(", "),
      babyName: eBabyName,
      babyBirthDate: eBabyDate,
      babyWeight: eBabyWeight,
      babyBirthDetails: eBabyDetails
    }).then(res => {
      setSavingEdit(false);
      if (res.success) {
        setEditing(false);
        onUpdated();
      }
    });
  };

  const generateInvoice = () => {
    setGenerating(true);
    apiCall({ action: "generateClientInvoiceData", pin, clientId: client.id }).then(res => {
      setGenerating(false);
      if (res.success) setInv(res);
    });
  };

  const saveAndPrint = () => {
    if (!inv) return;
    if (!invoiceNumber.trim()) { setNote("Enter an invoice number first."); return; }
    setSaving(true);
    apiCall({
      action: "recordManualInvoice",
      pin,
      invoiceNumber: invoiceNumber.trim(),
      clientLabel: client.name,
      totalTtc: inv.netAPayer.toFixed(3),
      objet
    }).then(res => {
      setSaving(false);
      if (res.success) {
        setSaved(true);
        setNote(res.duplicate ? "Saved — note: this number was already in your log." : "Saved to your invoice log.");
        printInvoiceDoc({ ...inv, objet }, invoiceNumber, invLang);
      } else {
        setNote(res.error || "Could not save.");
      }
    });
  };

  const printInvoice = () => printInvoiceDoc({ ...inv, objet }, invoiceNumber, invLang);
  const invForDoc = inv ? { ...inv, objet } : null;

  const printProfile = () => {
    // Pull the latest ledger and bookings, then build the printable profile.
    Promise.all([
      apiCall({ action: "getClientLedger", pin, clientId: client.id }),
      apiCall({ action: "getClientBookings", pin, clientId: client.id })
    ]).then(([led, bk]) => {
      let body = "<h1>" + escapeHtml(client.name) + "</h1>";
      body += '<div class="meta">' + escapeHtml(client.packageName || "") + (client.location ? " · " + escapeHtml(client.location) : "") + "</div>";

      body += '<div class="section">';
      if (client.phone) body += '<div class="row"><span class="label">Phone</span><span>' + escapeHtml(client.phone) + "</span></div>";
      if (client.email) body += '<div class="row"><span class="label">Email</span><span>' + escapeHtml(client.email) + "</span></div>";
      if (client.assignedStaff && client.assignedStaff.length) body += '<div class="row"><span class="label">Staff</span><span>' + escapeHtml(client.assignedStaff.join(", ")) + "</span></div>";
      body += '<div class="row"><span class="label">Status</span><span>' + escapeHtml(client.status || "active") + "</span></div>";
      body += "</div>";

      if (client.babyName || client.babyBirthDate) {
        body += "<h2>Baby</h2><div class='section'>";
        if (client.babyName) body += '<div class="row"><span class="label">Name</span><span>' + escapeHtml(client.babyName) + "</span></div>";
        if (client.babyBirthDate) body += '<div class="row"><span class="label">Born</span><span>' + escapeHtml(client.babyBirthDate) + (client.babyWeight ? " · " + escapeHtml(client.babyWeight) + " kg" : "") + "</span></div>";
        if (client.babyBirthDetails) body += '<div class="row"><span class="label">Details</span><span>' + escapeHtml(client.babyBirthDetails) + "</span></div>";
        body += "</div>";
      }

      if (led && led.success) {
        body += "<h2>Payments & balance</h2><div class='section'>";
        body += '<div class="row"><span class="label">Owed</span><span>' + escapeHtml(led.totalOwed) + " TND</span></div>";
        body += '<div class="row"><span class="label">Paid</span><span>' + escapeHtml(led.totalPaid) + " TND</span></div>";
        body += '<div class="row"><span class="label">Balance</span><span>' + (led.balance <= 0 ? "Paid in full" : escapeHtml(led.balance) + " TND remaining") + "</span></div>";
        body += "</div>";
      }

      if (bk && bk.success && bk.bookings.length) {
        body += "<h2>Booked appointments</h2><table><thead><tr><th>Date</th><th>Time</th><th>Service</th><th>When</th></tr></thead><tbody>";
        body += bk.bookings.map(b =>
          "<tr><td>" + escapeHtml(b.date || "—") + "</td><td>" + escapeHtml(b.time || "—") +
          "</td><td>" + escapeHtml(b.service || "") + "</td><td>" + escapeHtml(b.when || "") + "</td></tr>"
        ).join("");
        body += "</tbody></table>";
      }

      printDocument(client.name + " — profile", body);
    });
  };

  const runDelete = () => {
    setDeleting(true);
    setDeleteErr("");
    apiCall({ action: "deleteClient", pin, clientId: client.id }).then(res => {
      setDeleting(false);
      if (res.success) {
        onDeleted();
      } else {
        setDeleteErr(res.error || "Could not delete this client.");
      }
    });
  };

  if (editing) {
    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <h2>Edit {client.name}</h2>
          <p className="page-sub" style={{marginBottom: 18}}>Changes save to this client's profile</p>

          <div className="form-group">
            <label className="form-label">Client name</label>
            <input className="form-input" value={eName} onChange={e => setEName(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">Phone</label>
            <input className="form-input" value={ePhone} onChange={e => setEPhone(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" value={eEmail} onChange={e => setEEmail(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">Location</label>
            <select className="form-select" value={eLocation} onChange={e => setELocation(e.target.value)}>
              {locations.map(l => <option key={l} value={l}>{l}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Status</label>
            <select className="form-select" value={eStatus} onChange={e => setEStatus(e.target.value)}>
              <option value="active">Active</option>
              <option value="completed">Completed</option>
            </select>
            <p style={{fontSize: 11, color: "var(--grey)", marginTop: 4}}>
              Mark a client Completed when their package is finished — they'll move out of your Active filter but stay on file.
            </p>
          </div>
          <div className="form-group">
            <label className="form-label">Package</label>
            <select className="form-select" value={ePackageId} onChange={e => setEPackageId(e.target.value)}>
              {packages.map(p => <option key={p.id} value={p.id}>{p.name} ({p.price} TND)</option>)}
            </select>
            {ePackageId !== client.packageId && (
              <p style={{fontSize: 11, color: "#92400E", marginTop: 6}}>
                Changing the package will reset this client's session/progress tracking.
              </p>
            )}
          </div>
          <div className="form-group">
            <label className="form-label">Custom price (optional)</label>
            <input className="form-input" type="number" value={eCustomPrice} onChange={e => setECustomPrice(e.target.value)} placeholder="Leave blank for package default" />
          </div>

          {staffList && staffList.length > 0 && (
            <div className="form-group">
              <label className="form-label">Assigned staff</label>
              <div className="assign-chips">
                {staffList.map(s => (
                  <span key={s.name} className={"assign-chip" + (eAssigned.includes(s.name) ? " on" : "")} onClick={() => toggleAssigned(s.name)}>
                    {s.name}
                  </span>
                ))}
              </div>
            </div>
          )}

          <div style={{borderTop: "1px solid var(--grey-light)", margin: "18px 0", paddingTop: 14}}>
            <div className="component-label" style={{marginBottom: 10}}>Baby's birth (after delivery)</div>
            <div className="form-group">
              <label className="form-label">Baby's name</label>
              <input className="form-input" value={eBabyName} onChange={e => setEBabyName(e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Birth date</label>
              <input className="form-input" type="date" value={eBabyDate} onChange={e => setEBabyDate(e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Birth weight (kg)</label>
              <input className="form-input" type="number" step="0.01" value={eBabyWeight} onChange={e => setEBabyWeight(e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Birth details / notes</label>
              <textarea className="form-input" rows={3} style={{resize: "vertical"}} value={eBabyDetails} onChange={e => setEBabyDetails(e.target.value)} placeholder="e.g. vaginal birth, 39 weeks, born at Clinique X" />
            </div>
          </div>

          <div className="modal-actions">
            <button className="btn-secondary" onClick={() => setEditing(false)}>Cancel</button>
            <button className="btn-confirm" disabled={savingEdit} onClick={saveEdit}>
              {savingEdit ? "Saving..." : "Save changes"}
