function AccountingView({ pin }) {
  const [periodType, setPeriodType] = useState("month");
  const [anchor, setAnchor] = useState(new Date().toISOString().split("T")[0]);
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(true);

  const [expDate, setExpDate] = useState(new Date().toISOString().split("T")[0]);
  const [expCategory, setExpCategory] = useState("");
  const [expDesc, setExpDesc] = useState("");
  const [expSupplier, setExpSupplier] = useState("");
  const [expMf, setExpMf] = useState("");
  const [expHt, setExpHt] = useState("");
  const [expTva, setExpTva] = useState("");
  const [expTtc, setExpTtc] = useState("");
  const [expReceipt, setExpReceipt] = useState("");
  const [expMethod, setExpMethod] = useState("");
  const [expBusy, setExpBusy] = useState(false);
  const [expNote, setExpNote] = useState("");
  const [showExpenseForm, setShowExpenseForm] = useState(false);

  const load = () => {
    setLoading(true);
    apiCall({ action: "getAccountingReport", pin, periodType, anchor }).then(res => {
      if (res.success) setReport(res);
      setLoading(false);
    });
  };

  useEffect(() => { load(); }, [periodType, anchor]);

  const shiftAnchor = (dir) => {
    const d = new Date(anchor);
    if (periodType === "week") d.setDate(d.getDate() + dir * 7);
    else if (periodType === "year") d.setFullYear(d.getFullYear() + dir);
    else d.setMonth(d.getMonth() + dir);
    setAnchor(d.toISOString().split("T")[0]);
  };

  const printReport = () => {
    if (!report) return;
    let body = "<h1>Report — " + escapeHtml(report.label) + "</h1>";

    body += "<h2>Income</h2><div class='section'>";
    body += '<div class="row"><span class="label">Bookings in period</span><span>' + escapeHtml(report.income.bookings) + "</span></div>";
    body += '<div class="row"><span class="label">CA HT (taxable)</span><span>' + escapeHtml(report.income.caHt) + " TND</span></div>";
    body += '<div class="row"><span class="label">TVA collectée (19%)</span><span>' + escapeHtml(report.income.tvaCollected) + " TND</span></div>";
    body += '<div class="row"><span class="label">CA TTC (taxable)</span><span>' + escapeHtml(report.income.caTtc) + " TND</span></div>";
    body += '<div class="row"><span class="label">Transport (non-taxable)</span><span>' + escapeHtml(report.income.transport) + " TND</span></div>";
    body += '<div class="row"><span class="label">Total received</span><span>' + escapeHtml(report.income.totalReceived) + " TND</span></div>";
    body += "</div>";

    body += "<h2>Service breakdown</h2>";
    if (report.serviceBreakdown.length === 0) {
      body += "<p>No bookings in this period.</p>";
    } else {
      body += "<table><thead><tr><th>Service</th><th>Count</th><th>Revenue (TTC)</th></tr></thead><tbody>";
      body += report.serviceBreakdown.map(s =>
        "<tr><td>" + escapeHtml(s.service) + "</td><td>" + escapeHtml(s.count) + "</td><td>" + escapeHtml(s.ttc) + " TND</td></tr>"
      ).join("");
      body += "</tbody></table>";
    }

    body += "<h2>TVA position (estimate)</h2><div class='section'>";
    body += '<div class="row"><span class="label">TVA collectée</span><span>' + escapeHtml(report.tva.collected) + " TND</span></div>";
    body += '<div class="row"><span class="label">TVA déductible</span><span>' + escapeHtml(report.tva.deductible) + " TND</span></div>";
    body += '<div class="row"><span class="label">' + (report.tva.toDeclare >= 0 ? "Net TVA to declare" : "TVA credit forward") + "</span><span>" + escapeHtml(Math.abs(report.tva.toDeclare)) + " TND</span></div>";
    body += '<div class="row"><span class="label">Result (HT)</span><span>' + escapeHtml(report.resultHt) + " TND</span></div>";
    body += "</div>";

    printDocument("Report — " + report.label, body);
  };

  const resetExpenseForm = () => {
    setExpDate(new Date().toISOString().split("T")[0]); setExpCategory(""); setExpDesc("");
    setExpSupplier(""); setExpMf(""); setExpHt(""); setExpTva(""); setExpTtc("");
    setExpReceipt(""); setExpMethod("");
  };

  const submitExpense = () => {
    if (!expDesc || (!expHt && !expTtc)) {
      setExpNote("Add a description and at least one amount (HT or TTC).");
      return;
    }
    setExpBusy(true);
    apiCall({
      action: "addExpense", pin, date: expDate, category: expCategory, description: expDesc,
      supplier: expSupplier, supplierMf: expMf, amountHt: expHt, tva: expTva, amountTtc: expTtc,
      receiptNo: expReceipt, method: expMethod
    }).then(res => {
      setExpBusy(false);
      if (res.success) {
        setExpNote("Expense recorded.");
        resetExpenseForm();
        load();
      } else {
        setExpNote(res.error || "Could not save expense.");
      }
    });
  };

  const removeExpense = (id) => {
    apiCall({ action: "deleteExpense", pin, expenseId: id }).then(res => {
      if (res.success) load();
      else setExpNote(res.error || "Could not remove.");
    });
  };

  return (
    <div>
      <h1 className="page-title">Reports &amp; Accounting</h1>
      <p className="page-sub">Income, service breakdown, expenses, and your TVA position — by week, month, or year.</p>

      <div className="week-picker" style={{gap: 10, flexWrap: "wrap"}}>
        <div style={{display: "flex", gap: 0, border: "1.5px solid var(--grey-light)", borderRadius: 8, overflow: "hidden"}}>
          {["week", "month", "year"].map(p => (
            <button
              key={p}
              onClick={() => setPeriodType(p)}
              style={{
                padding: "8px 16px", border: "none", cursor: "pointer", fontSize: 13, fontFamily: "inherit",
                background: periodType === p ? "var(--magenta)" : "transparent",
                color: periodType === p ? "#fff" : "var(--grey)"
              }}
            >
              {p === "week" ? "Weekly" : p === "month" ? "Monthly" : "Yearly"}
            </button>
          ))}
        </div>
        <button className="btn-small" onClick={() => shiftAnchor(-1)}>← Prev</button>
        <span style={{fontSize: 14, fontWeight: 600, color: "var(--magenta-dark)"}}>{report ? report.label : "..."}</span>
        <button className="btn-small" onClick={() => shiftAnchor(1)}>Next →</button>
        {report && <button className="btn-small" style={{marginLeft: "auto"}} onClick={printReport}>Print report</button>}
      </div>

      {loading && <div className="loading">Loading report...</div>}

      {!loading && report && (
        <React.Fragment>
          <div className="card">
            <div className="component-label">Income</div>
            <div className="ledger-row"><span>Bookings in period</span><span>{report.income.bookings}</span></div>
            <div className="ledger-row"><span>CA HT (taxable)</span><span>{report.income.caHt} TND</span></div>
            <div className="ledger-row"><span>TVA collectée (19%)</span><span>{report.income.tvaCollected} TND</span></div>
            <div className="ledger-row" style={{fontWeight: 600}}><span>CA TTC (taxable)</span><span>{report.income.caTtc} TND</span></div>
            <div className="ledger-row" style={{fontSize: 12, color: "var(--grey)"}}><span>Transport received (non-taxable)</span><span>{report.income.transport} TND</span></div>
            <div className="ledger-row" style={{fontSize: 12, color: "var(--grey)"}}><span>Total received (incl. transport)</span><span>{report.income.totalReceived} TND</span></div>
          </div>

          <div className="card">
            <div className="component-label">Service breakdown</div>
            {report.serviceBreakdown.length === 0 && <p style={{fontSize: 13, color: "var(--grey)"}}>No bookings in this period.</p>}
            {report.serviceBreakdown.map((s, i) => (
              <div className="ledger-row" key={i}>
                <span>{s.service} ({s.count})</span>
                <span>{s.ttc} TND</span>
              </div>
            ))}
          </div>

          <div className="card">
            <div className="component-label">TVA position (estimate)</div>
            <div className="ledger-row"><span>TVA collectée (on income)</span><span>{report.tva.collected} TND</span></div>
            <div className="ledger-row"><span>TVA déductible (on expenses)</span><span>{report.tva.deductible} TND</span></div>
            <div className="ledger-row" style={{fontWeight: 600}}>
              <span>{report.tva.toDeclare >= 0 ? "Net TVA to declare" : "TVA credit carried forward"}</span>
              <span>{Math.abs(report.tva.toDeclare)} TND</span>
            </div>
            <p style={{fontSize: 11, color: "var(--grey)", marginTop: 6}}>
              An estimate based on your recorded income and expenses for this period — confirm with your declarations before filing.
            </p>
          </div>

          <div className="card">
            <div className="component-label">Result (HT)</div>
            <div className="ledger-row" style={{fontWeight: 600}}>
              <span>Income HT − Expenses HT</span>
              <span>{report.resultHt} TND</span>
            </div>
          </div>

          <div className="card">
            <div className="component-label" style={{display: "flex", justifyContent: "space-between", alignItems: "center"}}>
              <span>Expenses</span>
              <button className="btn-small" onClick={() => setShowExpenseForm(s => !s)}>
                {showExpenseForm ? "Close" : "+ Add expense"}
              </button>
            </div>

            {showExpenseForm && (
              <div style={{marginTop: 10, padding: 12, background: "#FAF9F9", borderRadius: 8}}>
                <div className="payment-form-row">
                  <input className="form-input" type="date" value={expDate} onChange={e => setExpDate(e.target.value)} />
                  <input className="form-input" placeholder="Category (e.g. Fournitures)" value={expCategory} onChange={e => setExpCategory(e.target.value)} />
                </div>
                <input className="form-input" style={{marginTop: 6, width: "100%"}} placeholder="Description" value={expDesc} onChange={e => setExpDesc(e.target.value)} />
                <div className="payment-form-row" style={{marginTop: 6}}>
                  <input className="form-input" placeholder="Supplier" value={expSupplier} onChange={e => setExpSupplier(e.target.value)} />
                  <input className="form-input" placeholder="Supplier MF" value={expMf} onChange={e => setExpMf(e.target.value)} />
                </div>
                <div className="payment-form-row" style={{marginTop: 6}}>
                  <input className="form-input" type="number" placeholder="HT" value={expHt} onChange={e => setExpHt(e.target.value)} />
                  <input className="form-input" type="number" placeholder="TVA" value={expTva} onChange={e => setExpTva(e.target.value)} />
                  <input className="form-input" type="number" placeholder="TTC" value={expTtc} onChange={e => setExpTtc(e.target.value)} />
                </div>
                <p style={{fontSize: 11, color: "var(--grey)", margin: "4px 0"}}>Fill in any combination — the others are calculated (19% TVA assumed if only one amount is given).</p>
                <div className="payment-form-row" style={{marginTop: 6}}>
                  <input className="form-input" placeholder="Receipt No." value={expReceipt} onChange={e => setExpReceipt(e.target.value)} />
                  <input className="form-input" placeholder="Payment method" value={expMethod} onChange={e => setExpMethod(e.target.value)} />
                </div>
                <button className="btn-small" style={{marginTop: 8}} onClick={submitExpense} disabled={expBusy}>
                  {expBusy ? "Saving..." : "Save expense"}
                </button>
                {expNote && <p style={{fontSize: 12, color: "var(--magenta-dark)", marginTop: 6}}>{expNote}</p>}
              </div>
            )}

            <div style={{marginTop: 10}}>
              {report.expenses.length === 0 && <p style={{fontSize: 13, color: "var(--grey)"}}>No expenses logged in this period.</p>}
              {report.expenses.map(e => (
                <div key={e.id} style={{borderLeft: "2px solid var(--grey-light)", paddingLeft: 10, marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "flex-start"}}>
                  <div>
                    <div style={{fontSize: 13, fontWeight: 600}}>{e.date} · {e.description}</div>
                    <div style={{fontSize: 12, color: "var(--grey)"}}>
                      {e.category ? e.category + " · " : ""}{e.supplier}{e.receiptNo ? " · Reçu " + e.receiptNo : ""}
                    </div>
                  </div>
                  <div style={{textAlign: "right", whiteSpace: "nowrap"}}>
                    <div style={{fontSize: 13, fontWeight: 600}}>{e.ttc} TND</div>
                    <button className="btn-remove-row" onClick={() => removeExpense(e.id)} title="Remove">×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function App() {
  const [staff, setStaff] = useState(null);
  const [pin, setPin] = useState(null);

  useEffect(() => {
    const savedPin = localStorage.getItem("jbs_pin");
    if (savedPin) {
      apiCall({ action: "login", pin: savedPin }).then(res => {
        if (res.success) {
          setStaff(res.staff);
          setPin(savedPin);
        } else {
          localStorage.removeItem("jbs_pin");
        }
      });
    }
  }, []);

  const handleLogout = () => {
    localStorage.removeItem("jbs_pin");
    setStaff(null);
    setPin(null);
  };

  if (!staff) {
    return <LockScreen onLogin={(s, p) => { setStaff(s); setPin(p); }} />;
  }

  return <Dashboard staff={staff} pin={pin} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
